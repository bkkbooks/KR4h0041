body:
  text: 古文關鍵總集類提要臣等謹案古文關鍵二卷宋吕祖謙編取韓愈栁宗元歐陽修曾鞏蘇洵蘇軾張耒之文凡六十餘篇各標舉其命意布局之處示學者以門徑故謂之關鍵卷首冠以總論看文作文之法考宋史藝文志載是書作十二卷今卷首所載看諸家文法凡王安石蘇轍李豸秦觀朝補之諸人俱在論列而其文無一篇録入似此本非其全書然書録解題所載亦祗二卷與今本卷數相合所稱韓栁歐蘇曽諸家亦與今本家數相合知全書實止於此宋志荒謬誤增一十字也此本為明嘉靖中所刋前有鄭鳯翔序又别一本所刻旁有鈎抹之處而評論則同考陳振孫謂其標抹注釋以教初學則原本實有標抹此本蓋刋板之時不知宋人讀書於要處多以筆抹不似今人之圈點以為無用而刪之矣葉盛水東日記曰宋儒批選文章前有吕東萊次則樓迂齋周應龍又其次則謝疊山也朱子嘗以拘於腔子議東萊矣要之批選議論不為無益亦講學之一端耳云云然祖謙此書實為論文而作不關講學盛之所云乃文章正宗之評非此書之評也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部八古文關鍵目録總集類卷上韓文獲麟解師説諫臣論原道原人辨諱雜説重答張籍書與孟簡尚書書答陳生書答陳商書送王含秀才序送文暢序柳文晉文問守原議桐葉封弟辨封建論種樹郭槖駝傳梓人傳捕蛇者説與韓愈書論史事送薛存義序歐文朋黨論縱囚論為君難論下本論上本論下春秋論春秋論中泰誓論上范司諫書送無黨南歸序送王陶序卷下老蘇文春秋論管仲論髙祖論審勢上富丞相書上田樞密書東坡文荀卿論子思論韓非論孫武論朝錯論孔子墮三都志林秦始皇扶蘇志林范增志林厲法禁倡勇敢錢塘勤上人詩集敘六一居士集敘潮州韓文公廟碑王仲儀真贊敘潁濱文三國論君術南豐文唐論救災議戰國策目録序送趙宏序宛丘文景帝論用大論古文關鍵總論看文字法學文須熟看韓柳歐蘇先見文字體式然後遍考古人用意下句處蘇文當用其意若用其文恐易厭蓋近世多讀第一看大概主張第二看文勢規模第三看綱目關鍵如何是主意首尾相應如何是一篇鋪敘次第如何是抑揚開合處第四看警策句法如何是一篇警策如何是下句下字有力處如何是起頭換頭佳處如何是繳結有力處如何是融化屈折剪截有力如何是實體貼題目處看韓文法簡古一本於經學韓文簡古不可不學他法度徒簡古而乏法度則朴而不華看柳文法關鍵出於國語當學他好處當戒他雄辨議論文字亦反覆看歐文法平淡祖述韓子議論文字最反覆學歐平淡不可不學他淵源徒平淡而無淵源則枯而不振看蘇文法波瀾出於戰國策史記亦得關鍵法當戒他不純處看諸家文法曾文專學歐比歐文露筋骨子由文太拘執王文純潔學王不成遂無氣焰李文太煩亦粗秦文知常而不知變張文知變而不知常朝文粗率自秦而下三人皆學蘇者以上評韓栁歐蘇等文字説齋先生唐仲友亦常以此説誨人論作文法文字一篇之中須有數行齊整處須有數行不齊整處或緩或急或顯或晦緩急顯晦相間使人不知其為緩急顯晦常使經緯相通有一脈過接乎其間也蓋有形者綱目無形者血脈也筆健而不粗意深而不晦句新而不怪語新而不狂常中有變正中有竒題常則意新意常則語新結前生後曲折斡旋轉換有力反覆操縱有用文字議論文字為文之妙在敘事狀情辭源浩渺不失之冗意思新轉處多則不緩上下離合聚散前後遲速左右逺近彼我一二次第本末明白整齊緊切的當流轉豐潤精妙端潔清新簡肅清快雅健立意簡短閎大雄壯清徑華麗縝密典嚴以上格製詳具于下卷篇中論文字病深晦怪冗弱澀虛直疏碎緩暗塵俗熟爛輕易排事説不透意未盡泛而不切
