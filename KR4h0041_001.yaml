body:
  text: 古文關鍵卷上宋吕祖謙撰韓文獲麟解字少意多文字立節所以甚佳其抑揚開合只主祥字反覆作五段麟之為靈昭昭也詠於詩書於春秋雜出於傳記百家之書雖婦人女子皆知其為祥也然麟之為物不畜於家不恆有於天下其為形也不類非若馬牛犬豕豺狼麋鹿然然則雖有麟不可知其為麟也角者吾知其為牛鬛者吾知其為馬犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿惟麟也不可知不可知則其謂之不祥也亦宜雖然麟之出必有聖人在乎位麟為聖人出也聖人者必知麟一本有麟字之果不為不祥也又曰麟之所以為麟者以德不以形若麟之出不待聖人則其謂之不祥也亦宜師説此篇最是結得段段有力中間三段自有三意説起然大概意思相承都不失本意古之學者必有師師者所以傳道受業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎是故無貴無賤無長無少道之所存師之所存也嗟乎師道之不傳也久矣欲人之無惑也難矣古之聖人其出人也逺矣猶且從師而問焉今之衆人其去聖人也亦逺矣而恥學於師是故聖益聖愚益愚聖人之所以為聖愚人之所以為愚其皆出於此乎愛其子擇師而教之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者也非吾所謂傳其道解其惑者也句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近諛嗚呼師道之不復可知矣巫醫樂師百工之人君子鄙之今其智乃反不能及可怪也歟聖人無常師萇𢎞師襄老𣆀郯子之徒其賢不及孔子孔子曰三人行則必有我師故弟子不必不如師師不必賢於弟子聞道有先後業術有專攻如是而已李氏子蟠年十七好古文六藝經傳皆通習之不拘於時請學於余余嘉其能行古道作師説以貽之諫臣論意勝反題格此篇是針規攻擊體是反題難文字之祖或問諫議大夫陽城於愈可以為有道之士乎哉學廣而聞多不求聞於人也行古人之道居於晉之鄙晉之鄙人薰其德而善良者幾千人大臣聞而薦之天子以為諫議大夫人皆以為華陽子不色喜居於位五年矣視其德如在草野彼豈以富貴移易其心哉愈應之曰是易所謂恆其德貞而夫子凶者也惡得為有道之士乎哉在易蠱之上九云不事王侯髙尚其事蹇之六二則曰王臣蹇蹇匪躬之故夫亦以所居之時不一而所蹈之德不同也若蠱之上九居無用之地而致匪躬之節蹇之六二在王臣之位而髙不事之心則冒進之患生曠官之刺興志不可則尤之不終無也今陽子實一匹夫在位不為不久矣聞天下之得失不為不熟矣天子待之不為不加矣而未嘗一言及於政視政之得失若越人視秦人肥瘠忽焉不加喜戚於其心問其官則曰諫議也問其祿則曰下大夫之秩也問其政則曰我不知也有道之士固如是乎哉且吾聞之有官守者不得其職則去有言責者不得其言則去今陽子以為得其言乎哉得其言而不言與不得其言而不去無一可者也陽子將為祿仕乎古之人有云仕不為貧而有時乎為貧謂祿仕者也宜乎辭尊而居卑辭富而居貧若抱關擊柝者可也蓋孔子嘗為委吏矣嘗為乘田矣亦不敢曠其職必曰會計當而已矣必曰牛羊遂而已矣若陽子之秩祿不為卑且貧章章明矣而如此其可乎哉或曰否非若此也夫陽子惡訕上者惡為人臣招其君之過而以為名者故雖諫且議使人不得而知焉書曰爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德夫陽子之用心亦若此者愈應之曰若陽子之用心如此兹所謂惑者矣入則諫其君出不使人知者大臣宰相之事非陽子之所宜行也夫陽子本以布衣隱於蓬蒿之下主上嘉其行誼擢在此位官以諫為名誠宜有以奉其職使四方後代知朝廷有直言骨鯁之臣天子有不僣賞從諫如流之美庶巖穴之士聞而慕之束帶結髮願進於闕下而伸其辭説致吾君於堯舜熙鴻號於無窮也若書所謂則大臣宰相之事非陽子之所宜行也且陽子之心將使君人者惡聞其過乎是啓之也或曰陽子之不求聞而人聞之不求用而君用之不得已而起守其道而不變何子過之深也愈曰自古聖人賢士皆非有心求於聞用也閔其時之不平人之不義得其道不敢獨善其身而必兼濟天下也孜孜矻矻死而後已故禹家門不入孔席不暇暖而墨突不得黔彼二聖一賢者豈不知自安佚之為樂哉誠畏天命而悲人窮也夫天授人以賢聖才能豈使自有餘而已誠欲以補其不足者也耳目之於身也耳司聞而目司見聽其是非視其險易然後身得安焉聖賢者時人之耳目也時人者聖賢之身也且陽子之不賢則將役於賢以奉其上矣若果賢則固畏天命而閔人窮者也惡得以自暇逸乎哉或曰吾聞君子不欲加諸人而惡訐以為直者若吾子之論直則直矣無乃傷于德而費於辭乎好盡言以招人過國武子之所以見殺於齊也吾子亦聞乎愈曰君子居其位則思死其官未得位則思修其辭以明其道我將以明道也非以為直而加人也且國武子不能得善人而好盡言於亂國是以見殺傳曰惟善人能受盡言謂其聞而能改之也子告我曰陽子可以為有道之士也今雖不能及已陽子將不得為善人乎從前難到此已極了末後須用放他一著蓋陽子在當時畢竟是箇賢者大抵文字須當抑揚若作漢唐君臣文字先須取他長處後説他短處原道博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德仁與義為定名道與德為虛位故道有君子有小人而德有凶有吉老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂德德其所德非吾所謂德也凡吾所謂道德云者合仁與義言之也天下之公言也老子之所謂道德云者去仁與義言之也一人之私言也周道衰孔子沒火于秦黃老于漢佛于晉宋齊梁魏隋之間其言道德仁義者不入于楊則入于墨不入于墨則入于老不入于老則入于佛入于彼必出于此入者主之出者奴之入者附之出者汙之噫後之人其欲聞仁義道德之説孰從而聽之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其説樂其誕而自小也亦曰吾師亦嘗師之云爾不惟舉之於其口而又筆之於其書噫後之人雖欲聞仁義道德之説其孰從而求之甚矣人之好怪也不求其端不訊其末惟怪之欲聞古之為民者四今之為民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盜也古之時人之害多矣有聖人者立然後教之以相生養之道為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣飢然後為之食木處而顛土處而病也然後為之宫室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其湮鬱為之政以率其怠倦為之刑以鋤其強梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭兵甲以守之害至而為之備患生而為之防今其言曰聖人不死大盜不止剖斗折衡而民不爭嗚呼其亦不思而已矣如古之無聖人人之類滅久矣何也無羽毛鱗介以居寒熱也無爪牙以爭食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器皿通貨財以事其上者也君不出令則失其所以為君臣不能行君之令而致之民民不出粟米絲麻作器皿通貨財以事其上則誅今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清淨寂滅者嗚呼其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也帝之與王其號名殊其所以為聖一也夏葛而冬裘渴飲而飢食其事雖殊其所以為智一也今之言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責飢之食者曰曷不為飲之之易也傳曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外國家天下者滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之夷而進於中國則中國之經曰夷狄之有君不如諸夏之亡詩曰戎狄是膺荆舒是懲今也舉夷狄之法而加之先王之教之上幾何而不胥而為夷也夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賔主昆弟夫婦其服絲麻其居宫室其食粟米蔬果魚肉其為道易明而其為教易行也是故以之為己則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人鬼饗曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉苟與揚也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其説長然則如之何其可也曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡孤獨廢疾者有養也其亦庶乎其可也原人形於上者謂之天形於下者謂之地命於其兩間者謂之人形於上日月星辰皆天也形於下草木山川皆地也命於其兩間夷狄禽獸皆人也曰然則吾謂禽獸曰人可乎曰非也指山而問焉曰山乎曰山可也山有草木禽獸皆舉之矣指山之一草而問焉曰山乎曰山則不可故天道亂而日月星辰不得其行地道亂而草木山川不得其平人道亂而夷狄禽獸不得其情天者日月星辰之主也地者草木山川之主也人者夷狄禽獸之主也主而暴之不得其為主之道矣是故聖人一視而同仁篤近而舉逺辨諱愈與進士李賀書勸賀舉進士賀舉進士有名與賀爭名者毁之曰賀父名晉肅賀不舉進士為是勸之舉者為非聽者不察和而唱之同然一辭皇甫湜曰子與賀且得罪愈曰然律曰二名不偏諱釋之者曰謂若言徴不稱在言在不稱徴是也律曰不諱嫌名釋之者曰謂若禹與雨丘與蓲之類是也今賀父名晉肅賀舉進士為犯二名律乎為犯嫌名律乎父名晉子不得舉進士若父名仁子不得為人乎夫諱始於何時作法制以教天下者非周公孔子歟周公作詩不諱孔子不偏諱二名春秋不譏不諱嫌名康王釗之孫實為昭王曾參之父名晢曾子不諱昔周之時有騏期漢之時有杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎漢諱武帝名徹為通不聞又諱車轍之徹為某字也諱吕后名雉為野雞不聞又諱治天下之治為某字也今上章及詔不聞諱滸勢秉機也惟宦官宫妾乃不敢言諭及機以為觸犯士君子立言行事宜何所法守也今考之於經質之於律稽之以國家之典賀舉進士為可為不可耶凡事父母得如曾參可以無譏也作人得如周公孔子亦可以止也今世之士不務行周公孔子之行而諱親之名則務勝於曾參周公孔子亦見其惑也夫周公孔子曾參卒不可勝勝周公孔子曾參乃比於宦官宫妾則是宦官宫妾之孝於其親賢於周公孔子曾參者耶雜説龍噓氣成雲雲固弗靈於龍也然龍乘是氣茫茫窮乎玄間薄日月伏光景感震電神變化水下土汨陵谷雲亦靈怪矣哉雲龍之所能使為靈也若龍之靈則非雲之所能使為靈也然龍弗得雲無以神其靈矣失其所憑依信不可歟異哉其所憑依乃其所自為也易曰雲從龍既曰龍雲從之矣世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱於奴𨽻人之手駢死於槽櫪之間不以千里稱也馬之千里者一食或盡粟一石今食馬者不知其能千里而食也是馬雖有千里之能食不飽力不足才美不外見且欲與常馬等不可得安求其能千里也䇿之不以其道食之不能盡其材鳴之不能通其意執䇿而臨之曰天下無良馬嗚呼其真無馬耶其真不識馬耶重答張籍書此篇節奏嚴潔鋪敘明白吾子不以愈無似意欲推而納諸聖賢之域拂其邪心增其所未髙謂愈之質有可至於道者浚其源道其所歸溉其根將食其實此盛德者之所辭讓况於愈者哉抑其中有宜復者故不可遂已昔者聖人之作春秋也既深其文辭矣然猶不敢公傳道之口授弟子至於後世然後其書出焉其所以慮患之道微也今夫二氏之所宗而事之者下及公卿輔相吾豈敢昌言排之哉擇其可語者誨之猶時與吾悖其聲譊譊若遂成其書則見而怒之者必多矣必且以我為狂為惑其身之不能恤書於吾何有夫子聖人也且曰自吾得子路而惡聲不入於耳其餘輔而相者周天下猶且絶糧於陳畏於匡毁於叔孫奔走於齊魯宋衛之郊其道雖尊其窮也亦甚矣賴其徒相與守之卒有立於天下向使獨言之而獨書之其存也可兾乎今夫二氏行于中土也蓋六百有餘年矣其植根固其流波漫非所以朝令而夕禁也自文王沒武王周公成康相與守之禮樂皆在至乎夫子未久也自夫子而至乎孟子未久也自孟子而至乎揚雄亦未久也然猶其勤若此其困若此而後能有所立吾其可易而為之哉其為也易則其傳也不逺故余所以不敢也然觀古人得其時行其道則無所為書為書者皆所為不得行乎今而行乎後者也今吾之得吾志失吾志未可知俟五六十為之未失也天不欲使兹人有知乎則吾之命不可期如使兹人有知乎非我其誰哉其行道其為書其化今其傳後必有在矣吾子其何遽戚戚於吾所為哉前書謂吾與人商論不能下氣若好已勝者然雖誠有之抑非好已勝也好已之道勝也已之道乃夫子孟軻揚雄所傳之道也若不勝則無所為道吾豈敢避是名哉夫子之言曰吾與回言終日不違如愚則其與衆人辨也有矣駁雜之譏前書盡之吾子其復之昔者夫子猶有所戲詩不云乎善戲謔兮不為虐兮記曰張而不弛文武不為也豈害於道哉吾子其未之思乎孟君將有所適思與吾子别庶幾一來愈再拜與孟簡尚書書此一篇須看大開合愈白蒙惠書云有人傳愈近以奉釋氏者妄也潮州時有一老僧號太顛頗聰明識道理逺地無所可與語者故自山召至州郭留十數日實能外形骸以理自勝不為事物侵亂與之語雖不盡解要且胸中無滯礙自以為難得因與來往及祭神至海上遂造其廬及來袁州留衣服為别乃人之情非崇信其法求福田利益也孔子云丘之禱久矣凡君子行已立身自有法度聖賢事業具在方册可效可師仰不愧天俯不愧人內不愧心積善積惡殃慶自各以其類至何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎愷悌君子求福不回傳又曰不為威惕不為利疚假如釋氏能與人為禍福非守道君子之所懼也况萬萬無此理且彼佛者果何人哉其行事類君子耶小人耶若君子也必不妄加禍於守道之人如小人也其身已死其鬼不靈天地神祇昭布森列非可誣也又肯令其鬼行胸臆作威福於其間哉進退無所據而信奉之亦且惑矣且愈不助釋氏而排之者其亦有説孟子云今天下不之楊則之墨楊墨交亂而聖賢之道不明聖賢之道不明則三綱淪而九法斁禮樂崩而夷狄橫幾何其不為禽獸也故曰能言距楊墨者皆聖人之徒也揚子雲曰古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢且將數百年以至於秦卒滅先王之法燒除經書坑殺學士天下遂大亂及秦滅漢興且百年尚未知修明先王之道其後始除挾書之律稍求亡書招學士經雖少得尚皆殘缺十亡二三故學士多老死新者不見全經不能盡知先王之事各以所見為守分離乖隔不合不公二帝三王羣聖人之道於是大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何補然賴其言而今學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞爛而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆服左衽而言侏離矣故愈常推尊孟氏以為功不在禹下者為此也漢氏已來羣儒區區修補百孔千瘡隨亂隨失其危如一髮引千鈞綿綿延延寢以微滅於是時也而唱釋老於其間鼓天下之衆而從之嗚呼其亦不仁甚矣釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於已壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在傍又安得因一摧折自毁其道以從於邪也籍湜輩雖屢指教不知果能不叛去否辱吾兄眷厚而不獲承命惟增慙懼死罪死罪答陳生書師錫中間四段鋪敘齊整極好愈白陳生足下今之負名譽享顯榮者在上位幾人足下求速化之術不於其人乃以訪愈是所謂借聽於聾求道於盲雖其請之勤勤教之云云未有見其得者也愈之志在古道又甚好其言辭觀足下之書及十四篇之詩亦云有志於是矣而其所問則名所慕則科故愈疑於其對焉雖然厚意不可虛辱聊為足下誦其所聞蓋君子病乎在已而順乎在天待已以信而事親以誠所謂病乎在己者仁義存乎內彼聖賢者能推而廣之而我蠢然為衆人所謂順乎在天者貴賤窮通之來平吾心而隨順之不以纍于其初所謂待己以信者已果能之人曰不能勿信也已果不能人曰能之勿信也孰信哉信乎已而已矣所謂事親以誠者盡其心不夸於外先乎其質而後乎其文者也盡其心不夸於外者不以己之得於外者為父母榮也名與位之謂也先乎其質者文行也後乎其文者飲食甘旨以其外物供養之道者也誠者不欺之名也待於外而後為養薄於質而厚於文斯其不類於欺歟果若是子之汲汲科名以不得進為親之羞者惑也速化之術如是而已古之學者惟義之問誠將學於太學愈獨守是説而俟見知焉答陳商書設譬格愈白辱惠書語髙而旨深三四讀尚不能通曉茫然增愧赧又不以其淺弊無過人智識且喻以所守幸甚愈敢不吐情實然自識其不足補吾子所須也齊王好竽有求仕於齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下吾鼓瑟合軒轅氏之律吕客罵之曰王好竽而子鼓瑟瑟雖工如王不好何是所謂工於瑟而不工於求齊也今舉進士於此世求利祿行道於此世而為文必使一世人不好得無與操瑟立齊門者比歟文誠工不利於求求不得則怒且怨不知君子必爾為不也故區區之心每有來訪者皆有意於不肖者也略不辭讓遂盡言惟吾子諒察送王含秀才序有感慨不足意吾少時讀醉鄉記私怪隱居者無所纍於世而猶有是言豈誠旨於味耶及讀阮籍陶潛詩然後乃知彼雖偃蹇不欲與世接然猶未能平其心或為事物是非相感發於是有託而逃焉者也若顔氏之操瓢與簞曾參歌聲若出金石彼得聖人而師之汲汲每若不可及其於外也固不暇尚何麯蘖之託而昏冥之逃耶吾又以為悲醉鄉之徒不遇也建中初天子嗣位有意貞觀開元之丕績在朝廷之臣爭言事當此時醉鄉之後世又以直廢吾既悲醉鄉之文辭而又嘉良臣之烈思識其子孫今子之來見我也無所挾吾猶將張之况文與行不失其世守渾然端且厚惜乎吾力不能振之而其言不見信於世也於是行故與之飲酒送浮屠師文暢序體格好就他身上説極好處人固有儒名而墨行者問其名則是校其行則非可以與之遊乎如有墨名而儒行者問其名則非校其行則是可以與之遊乎揚子雲稱在門墻則揮之在夷狄則進之吾取以為法焉文暢喜為文章其周遊天下凡有行必請於搢紳先生以求詠歌其所志貞元十九年春將行東南栁君宗元為之請解其􅋔得所敘詩纍百餘篇非至篤好其何能致多如是耶惜其無以聖人之道告之者而徒舉浮屠之説贈焉夫文暢浮屠也如欲聞浮屠之説當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物禮樂之盛其心必有慕焉拘其法而未能入故樂聞其説而請之如吾徒者宜當告之以二帝三王之道日月星辰之所以行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之説而瀆告之也民之初生固若禽獸夷狄然聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏是故道莫大乎仁義教莫正乎禮樂刑政施之於天下萬物得其宜措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於册中國之人世守之今浮屠者孰為而孰傳之耶夫鳥俯而啄仰而四顧夫獸深居而簡出懼物之為己害也猶且不脫焉弱之肉強之食今吾與文暢安居而暇食優遊以生死與禽獸異者寧可不知其所自耶夫不知者非其人之罪也知而不為之者惑也悅乎故不能即乎新者弱也知而不以告之者不仁也告而不以實者不信也余既重栁請又嘉浮屠能喜文辭於是乎言栁文晉文公問守原議看回互轉換貫珠相似辭簡意多大抵文字使事須下有力言語晉文公既受原於王難其守問寺人勃鞮以畀趙衰余謂守原政之大者也所以承天子樹霸功致命諸侯不宜謀及媟近以忝王命而晉君擇大任不公議於朝而私議於宫不博謀於卿相而獨謀於寺人雖或衰之賢足以守國之政不為敗而賊賢失政之端由是滋矣况當其時不乏言議之臣乎狐偃為謀臣先軫將中軍晉君疏而不咨外而不求乃卒定於內竪其可以為法乎且晉君將襲齊桓之業以翼天子乃大志也然而齊桓任管仲以興進竪刁以敗則獲原啓疆適其始政所以觀視諸侯也而乃背其所以興迹其所以敗然而能霸諸侯者以土則大以力則強以義則天子之策也誠畏之矣烏能得其心服哉其後景監得以相衛鞅𢎞石得以殺望之誤之者晉文公也嗚呼得賢臣以守大邑則問非失問舉非失舉也然猶羞當時陷後代若此况於問與舉又兩失者其何以救之哉余故著晉君之罪以附春秋許世子止趙盾之義桐葉封弟辨此一篇文字一段好如一段大抵做文字須留好意思在後令人讀一段好一段古之傳者有言成王以桐葉與小弱弟戲曰以封汝周公入賀王曰戲也周公曰天子不可戲乃封小弱弟於唐吾意不然王之弟當封耶周公宜以時言於王不待其戲而賀以成之也不當封耶周公乃成其不中之戲以地以人與小弱者為之主其得為聖乎且周公以王之言不可苟焉而已必從而成之耶設有不幸王以桐葉戲婦寺亦將舉而從之乎凡王者之德在行之何若設未得其當雖千易之不為病要於其當不可使易也而况以其戲乎若戲而必行之是周公教王遂過也吾意周公輔成王宜以道從容優樂要歸之大中而已必不逢其失而為之辭又不當束縛之馳驟之使若牛馬然急則敗矣且家人父子尚不能以此自克况號為君臣者耶是直小丈夫缺缺者之事非周公所宜用故不可信或曰封唐叔史佚成之結束委蛇曲折有不盡意不指定史佚又設一難在此封建論此是鋪敘間架法天地果無初乎吾不得而知之也生人果有初乎吾不得而知之也然則孰為近曰有初為近孰明之由封建而明之也彼封建者更古聖王堯舜禹湯文武而莫能去之蓋非不欲去之也勢不可也勢之來則其生人之初乎不初無以有封建封建非聖人意也彼其初與萬物皆生草木榛榛鹿豕狉狉人不能摶噬而且無毛羽莫克自奉自衛荀卿有言必將假物以為用者也夫假物者必爭爭而不已必就其能斷曲直者而聽命焉其智而明者所伏必衆告之以直而不改必痛之而後畏由是君長刑政生焉故近者聚而為羣羣之分其爭必大大而後有兵有德又有大者衆羣之長又就而聽命焉以安其屬於是有諸侯之列則其爭又有大者焉德又有大者諸侯之列又就而聽命焉以安其封於是有方伯連率之類則其爭又有大者焉德又有大者方伯連率之類又就而聽命焉以安其人然後天下會於一是故有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連率有方伯連率而後有天子自天子而至於里胥其德在人者死必求其嗣而奉之故封建非聖人意也勢也夫堯舜禹湯之事也逺矣及周而甚詳周有天下裂土田而瓜分之設五等邦羣后布履星羅四周于天下輪運而輻集合而為朝覲會同離而為守臣扞城然而降于夷王害禮傷尊下堂而迎覲者厯于宣王挾中興復古之德雄南征北伐之威卒不能定魯侯之嗣陵夷迄於幽平王室東遷而自列為諸侯矣厥後問鼎之輕重者有之射王中肩者有之伐凡伯誅萇𢎞者有之天下乖盩無君君之心余以為周之喪久矣徒建空名於公侯之上耳得非諸侯之盛強尾大不掉之咎歟遂判為十二合為七國威分于陪臣之邦國殄於後封之秦則周之敗端其在乎此矣秦有天下裂都會而為之郡邑廢侯衛而為之守宰據天下之雄圖都六合之上遊攝制四海運於掌握之內此其所以為得也不數載而天下大壞其有由矣亟役萬人暴其威刑竭其貨賄負鋤梃謫戌之徒圜視而合從大呼而成羣時則有叛人而無叛吏人怨於下而吏畏于上天下相合殺守劫令而並起咎在人怨非郡守之制失也漢有天下矯秦之枉徇周之制剖海內而立宗子封功臣數年之間奔命扶傷之不暇困平城病流矢陵遲不救者三代後乃謀臣獻畫而離削自守矣然而封建之始郡邑居半時則有叛國而無叛郡秦制之得亦以明矣繼漢而帝者雖百代可知也唐興制州邑立守宰此其所以為宜也然猶桀猾時起虐害方域者失不在於州而在於兵時則有叛將而無叛州州縣之設固不可革也或者曰封建者必私其土子其人適其俗修其理施化易也守宰者苟其心思遷其秩而已何能治乎余又非之周之事迹斷可見矣列侯驕盈黷貨事戎大凡亂國多理國寡侯伯不得變其政天子不得變其君私土子人者百不有其一失在於制不在於政周事然也秦之事迹亦斷可見矣有理人之制而不委郡邑是矣有理人之臣而不使守宰是矣郡守不得正其制守宰不得行其理酷刑苦役而萬人側目失在於政不在於制秦事然也漢興天子之政行於郡不行於國制其守宰不制其侯王侯王雖亂不可變也國人雖病不可除也及夫大逆不道然後掩捕而遷之勒兵而夷之耳大逆未彰姦利浚財怙勢作威大刻于民者無如之何及夫郡邑可謂理且安矣何以言之且漢知孟舒於田叔得魏尚於馮唐聞黃霸之明審觀汲黯之簡靖拜之可也復其位可也卧而委之以輯一方可也有罪得以黜有能得以賞朝拜而不道夕斥之矣夕受而不法朝斥之矣設使漢室盡城邑而侯王之縱其令亂其人戚之而已孟舒魏尚之術莫得而施黃霸汲黯之化莫得而行明遣而導之拜受而退已違矣下令而削之締交合從之謀周於同列則相顧裂眥勃然四起幸而不起則削其半削其半民猶瘁矣曷若舉而移之以全其人乎漢事然也今國家盡制郡邑連置守宰其不可變也固矣善制兵謹擇守則理平矣或者又曰夏商周漢封建而延秦郡邑而促尤非所謂知理者也魏之承漢也封爵猶建晉之承魏也因循不革而二姓陵替不聞延祚今矯變之垂二百祀大業彌固何繫於諸侯哉或者又以為殷周聖王也而不革其制固不當復議也是大不然夫殷周之不革者是不得已也蓋以諸侯之歸殷者三千焉資以黜夏湯不得而廢歸周者八百焉資以勝殷武王不得而易徇之以為安仍之以為俗湯武之所不得已也夫不得已非公之大者也私其力於已也私其衛於子孫也秦之所以革之者其為制公之大者也其情私也私其一已之威也私其盡臣蓄於我也然而公天下之端自秦始夫天下之道理安斯人者也使賢者居上不肖者居下而後可以理安今夫封建者繼世而理繼世而理者上果賢乎下果不肖乎則生人之理亂未可知也將欲利其社稷以一其人之視聽則又有世大夫世食祿邑以盡其封略聖賢生于其時亦無以立於天下封建者為之也豈聖人之制使至於是乎吾固曰非聖人之意也勢也種樹郭槖駝傳郭槖駝不知始何名病僂隆然伏行有類槖駝者故鄉人號之駝駝聞之曰甚善名我固當因捨其名亦自謂槖駝云其鄉曰豐樂鄉在長安西駝業種樹凡長安豪家富人為觀遊及賣果者皆爭迎取養視槖所種樹或移徙無不活且碩茂蚤實以蕃他植者雖窺伺效慕莫能如也有問之對曰槖駝非能使木壽且孳也以能順木之夭以致其性焉爾凡植木之性其本欲舒其培欲平其土欲故其築欲密既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣故吾不害其長而已非有能碩而茂之也不抑耗其實而已非有能蚤而蕃之也他植者則不然根拳而土易其培之也若不過焉則不及焉苟有能反是者則又愛之太恩憂之太勤旦視而暮撫已去而復顧而甚者爪其膚以驗其生枯搖其本以觀其疏密而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讎之故不我若也吾又何能為矣哉問者曰以子之道移之官理可乎駝曰我知種樹而已理非吾業也然吾居鄉見長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼曰官命促爾耕朂爾植督爾穫蚤繅而緒蚤織而縷字而幼孩遂而雞豚鳴鼓而聚之擊木而召之吾小人輒飱饔以勞吏者且不得暇又何以蕃吾生安吾性耶故病且怠若是則與吾業者其亦有類乎問者喜曰不亦善夫吾問養樹得養人術傳其事以為官戒也梓人傳抑揚好一節應一節嚴序事實裴封叔之第在光德里有梓人欵其門願傭隟宇而處焉所職尋引規矩繩墨家不居礱斫之器問其能曰吾善度材視棟宇之制髙深圓方短長之宜吾指使而羣工役焉捨我衆莫能就一宇故食於官府吾受祿三倍作於私家吾收其直太半焉他日入其室其牀闕足而不能理曰將求他工余甚笑之謂其無能而貪祿嗜貨者其後京兆尹將飾官署余往過焉委羣材會衆工或執斧斤或執刀鋸皆環立嚮之梓人左執引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斫刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢愠言畫宫於堵盈尺而曲盡其制計其毫釐而搆大厦無進退焉既成書于上棟曰某年某月某日某建則某姓字也凡執用之工不在列余圜視大駭然後知其相之工大矣繼而嘆曰彼將捨其手藝專其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣物莫近乎此也彼為天下者本於人其執役者為徒𨽻為鄉師里胥其上為下士又其上為中士為上士又其上為大夫為卿為公離而為六職判而為百役外薄四海有方伯連帥郡有守邑有宰皆有佐政其下有胥吏又其下皆有嗇夫阪尹以就役焉猶衆工之各有執伎以食力也彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其逺邇細大可手據其圖而究焉猶梓人畫宫于堵而績于成也能者進而可之使無所德不能者退而休之亦莫敢愠不衒能不矜名不親小勞不侵衆官日與天下之英才討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循迹而慕曰彼相之才也士或談殷周之理者曰伊傅周召其百執事之勤勞而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣其不知體要者反此以恪勤為公簿書為尊衒能矜名親小勞侵衆官竊取六職百役之事聽聽於府庭而遺其大者逺者焉所謂不通是道者也猶梓人而不知繩墨之曲直規矩之方圓尋引之短長姑奪衆工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟或曰彼主為室者儻或發其私智牽制梓人之慮奪其世守而道謀是用雖不能成功豈其罪耶亦在任之而已余曰不然夫繩墨誠陳規矩誠設髙者不可抑而下也狹者不可張而廣也由我則固不由我則圯彼將樂去固而就圯也則卷其術默其智悠爾而去不屈吾道是誠良梓人耳其或嗜其貨利忍而不能捨也喪其制量屈而不能守也棟橈屋壞則曰非我罪也可乎哉余謂梓人之道類於相故書而藏之梓人蓋古之審曲面勢者今謂之都料匠云余所遇者楊氏潛其名捕蛇者説感慨譏諷體永州之野産異蛇黑質白章觸草木盡死以齧人無禦之者然得而臘之以為餌可以已大風攣腕瘻厲去死肌殺三蟲其始大醫以王命聚之歲賦其二募有能捕之者當其租入永之人爭奔走焉有蔣氏者專其利三世矣問之則曰吾祖死於是吾父死於是今吾嗣為之十二年幾死者數矣言之貌若甚戚者余悲之且曰若毒之乎余將告于蒞事者更若役復若賦則何如蔣氏大戚汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不為斯役則久已病矣自吾氏三世居是鄉積於今六十歲矣而鄉鄰之生日蹙殫其地之出竭其廬之入號呼而轉徙飢渴而頓踣觸風雨犯寒暑呼噓毒癘往往而死者相藉也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二三焉與吾居十二年者今其室十無四五焉非死則徙爾而吾以捕蛇獨存悍吏之來吾鄉呌囂乎東西隳突乎南北譁然而駭者雖雞狗不得寧焉吾恂恂而起視其缶而吾蛇尚存則弛然而卧謹食之時而獻焉退而日食其土之所有以盡吾齒蓋一歲之犯死者二焉其餘則熙熙而樂豈若吾鄉鄰之旦旦有是哉今雖死于此比吾鄉鄰之死則已後矣又安敢毒耶余聞而愈悲孔子曰苛政猛於虎也吾嘗疑乎是今以蔣氏觀之猶信嗚呼孰知賦斂之毒有甚是蛇者乎故為之説以俟夫觀人風者得焉與韓愈書論史事亦是攻擊辨詰體頗似退之諌臣論正月二十一日宗元頓首十八丈退之侍者前獲書言史事云具與劉秀才書及今方見書藁私心甚不喜與退之往年言史事甚大謬若書中言退之不宜一日在館下安有探宰相意以為苟以史榮一韓退之耶若果爾退之豈宜虛受宰相榮已而冒居館下近密地食奉養役使掌故利紙筆為私書取以供子弟費古之志於道者不宜若是且退之以為紀録者有刑禍避不肯就尤非也史以名為褒貶猶且恐懼不敢為設使退之為御史中丞大夫其褒貶成敗人愈益顯其宜恐懼尤大也則又揚揚入臺府美食安坐行呼唱於朝廷而已耶在御史猶爾設使退之為宰相生殺出入升黜天下士其敵益衆則又將揚揚入政事堂美食安坐行呼唱於內庭外衢而已耶何以異不為史而榮其號利其祿也又言不有人禍必有天刑若以罪夫前古之為史者然亦甚惑凡居其位思直其道道苟直雖死不可回也如回之莫若亟去其位孔子之困于魯衛陳宋蔡齊楚者是也其時暗諸侯不能以也其不遇而死不以作春秋故也當其時雖不作春秋孔子猶不遇而死也若周公史佚雖紀言書事猶遇且顯也又不得以春秋為孔子纍范曄悖亂雖不為史其宗族亦誅馬遷觸天子喜怒班固不檢下崔浩沽其直以鬭暴虜皆非中道左丘明以疾盲出於不幸子夏不為史亦盲不可以是為戒其餘皆不出此是退之宜守中道不忘其直無以他事自恐退之之恐惟在不直不得中道刑禍非所恐也凡言二百年文武士多有誠如此者今退之曰我一人也何能明則同職者又所云若是後來繼今者又所云若是人人皆曰我一人則卒誰能紀傳之耶如退之但以所聞知孜孜不敢怠同職者後來繼今者亦各以所聞知孜孜不敢怠則庶幾不墜使卒有明也不然徒信人口語每每異辭日以滋久則所云磊磊軒天地決必不沉沒者且亂雜無可考非有志者所忍恣也果有志豈當待人督責迫蹙然後為官守耶又凡鬼神事渺茫荒惑無可凖明者所不道退之之智而猶懼於此今學如退之辭如退之好言論如退之慷慨自謂正直行行焉如退之猶所云若是則唐之史述其卒無可託乎明天子賢宰相得史才如此而又不果甚可痛哉退之宜更思可為速為果卒以為恐懼不敢則一日可引去又何以云行且謀也今當為而不為又諉館中他人及後生者此大惑已不勉已而欲勉人難矣哉送薛存義序雖字少極有反覆河東薛存義將行栁子載肉于俎崇酒于觴追而送之江之滸飲食之且告曰凡吏于土者若知其職乎蓋民之役非以役民而已也凡民之食於土者出其十一傭乎吏使司平於我也今受其直怠其事者天下皆然豈惟怠之又從而盜之向使傭一夫於家受若直怠若事乂盜若貨器則必甚怒而黜罰之矣以今天下多類此而民莫敢肆其怒與黜罰何哉勢不同也勢不同而理同如吾民何有達于理者得不恐而畏乎存義假令零陵二年矣蚤作而夜思勤力而勞心訟者平賦者均老弱無懷詐暴憎其為不虛取直也的矣其知恐而畏也審矣吾賤且辱不得與考績幽明之説於其往也故賞以酒肉而重之以辭歐陽文朋黨論在諌院進議論出人意表大凡作文妙處須出意外臣聞朋黨之説自古有之惟幸人君辨其君子小人而已大凡君子與君子以同道為朋小人與小人以同利為朋此自然之理也然臣謂小人無朋惟君子則有之其故何哉小人所好者祿利也所貪者財貨也當其同利之時暫相黨引以為朋者偽也及其見利而爭先或利盡而交疏則反相賊害雖其兄弟親戚不能相保故臣謂小人無朋其暫為朋者偽也君子則不然所守者道義所行者忠信所惜者名節以之修身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故為人君者但當退小人之偽朋用君子之真朋則天下治矣堯之時小人共工歡兜等四人為一朋君子八元八凱十六人為一朋舜佐堯退四凶小人之朋而進元凱君子之朋堯之天下大治及舜自為天子而臯夔稷契等二十二人並列于朝更相稱美更相推讓凡二十二人為一朋而舜皆用之天下亦大治書曰紂有臣億萬惟億萬心周有臣三千惟一心紂之時億萬人各異心可謂不為朋矣然紂以亡國周武王之臣三千人為一大朋而周用以興後漢獻帝時盡取天下名士囚禁之目為黨人及黃巾賊起漢室大亂後方悔悟盡解黨人而釋之然已無救矣唐之晚年漸起朋黨之論及昭宗時盡殺朝之名士或投之黃河曰此輩清流可投濁流而唐遂亡矣夫前世之主能使人人異心不為朋莫如紂能禁絶善人為朋莫如漢獻帝能誅戮清流之朋莫如唐昭宗之世然皆亂亡其國更相稱美推讓而不自疑莫如舜之二十二人舜亦不疑而皆用之然而後世不謂舜為二十二人朋黨所欺而稱舜為聰明之聖者以能辨君子與小人也周武之世舉其國之臣三千人共為一朋自古為朋之多且大莫如周然周用此以興者善人雖多而不厭也夫興亡治亂之迹為人君者可以鑒矣縱囚論文最緊曲折辨論驚人險語精神聚處詞盡意未盡此篇反覆有血脈信義行於君子而刑戮施於小人刑入于死者乃罪大惡極此又小人之尤甚者也寧以義死不苟幸生而視死如歸此又君子之尤難者也方唐太宗之六年録大辟囚三百餘人縱使還家約其自歸而就死是以君子之難能期小人之尤者以必能也其囚及期而卒自歸無後者是君子之所難而小人之所易也此豈近於人情或曰罪大惡極誠小人矣及施恩德以臨之可使變而為君子蓋恩德入人之深而移人之速有如是者矣曰太宗之為此所以求此名也然安知夫縱之去也不意其必來以兾免所以縱之乎又安知夫被縱而去也不意其自歸而必獲免所以復來乎夫意其必來而縱之是上賊下之情也意其必免而復來是下賊上之心也吾見上下交相賊以成此名也烏有所謂施恩德與夫知信義者哉不然太宗施德於天下於兹六年矣不能使小人不為極惡大罪而一日之恩能使視死如歸而存信義此又不通之論也然則何為而可曰縱而來歸殺之無赦而又縱之而又來則可知為恩德之致爾然此必無之事也若夫縱而來歸而赦之可偶一為之爾若屢為之則殺人者皆不死是可為天下之常法乎不可為常者其聖人之法乎是以堯舜三王之法必本於人情不立異以為髙不逆情以干譽為君難論下子由君術論正是此意嗚呼用人之難難矣未若聽言之難也夫人之言非一端也巧辨縱橫而可喜忠言質朴而多訥此非聽言之難在聽者之明暗也諛言順意而易悅直言逆耳而觸怒此非聽言之難在聽者之賢愚也是皆未足為難也若聽其言則可用然用之有輒敗人之事者聽其言若不可用然非如其言不能以成功者此然後為聽言之難也請試舉其一二戰國時趙將有趙括者善言兵自謂天下莫能當其父奢趙之名將老於用兵者也每與括言亦不能屈然奢終不以括為能也嘆曰趙若以括為將必敗趙事其後奢死趙遂以括為將其母自見趙王亦言括不可用趙王不聽使括將而攻秦括為秦軍射死趙兵大敗降秦者四十萬人坑於長平蓋當時未有如括善言兵亦未有如括大敗者也此聽其言可用用之輒敗人事者趙括是也秦始皇欲伐荆問其將李信用兵幾何信方年少而勇對曰不過二十萬足矣始皇大喜又以問老將王翦翦曰非六十萬不可始皇不悅曰將軍老矣何其怯也因以信為可用即與兵二十萬使伐荆王翦遂謝病退老於頻陽已而信大為荆人所敗亡七都尉而還始皇大慙自駕如頻陽謝翦因強起之翦曰必欲用臣非六十萬不可於是卒與六十萬而往遂以滅荆夫初聽其言若不可用然非如其言不能以成功者王翦是也且聽計於人者宜如何聽其言若可用用之宜矣輒敗事聽其言若不可用捨之宜矣然必如其説則成功此所以為難也豫又以謂秦趙二主非徒失於聽言亦由樂用新進忽棄老成此其所以敗也大抵新進之士喜勇鋭老成之人多持重此所以人主之好立功名者聽勇鋭之語則易合聞持重之言則難入也若趙括者則又有説焉豫略考史記所書是時趙方遣廉頗攻秦頗趙名將也秦人畏頗而知括虛言易與也因行反間於趙曰秦人所畏者趙括也若趙以為將則秦懼矣趙王不悟反間也遂用括為將以代頗藺相如力諌以為不可趙王不聽遂至於敗由是言之括虛談無實而不可用其父知之其母亦知之趙之諸臣藺相如等亦知之外至敵國亦知之獨其主不悟爾夫用人之失天下之人皆知其不可而獨其主不知者莫大之患也前世之禍亂敗亡由此者不可勝數也本論上昔荀卿子之説以為人性本惡著書一篇以持其論豫始愛之及見世人之歸佛者然後知荀卿之説謬焉甚矣人之性善也彼為佛者棄其父子絶其夫婦於人之性甚戾又有蠶食蠱蠧之弊然而民皆相率而歸焉者以佛有善之説故也嗚呼誠使吾民曉然知禮義之為善則安知不相率而從哉奈何教之諭之之不至也佛之説熟於人耳入乎其心久矣至於禮義之事則未嘗見聞今將號於衆曰禁汝之佛而為吾禮義則民將駭而走矣莫若為之以漸使其不知而趣焉可也蓋鯀之治水也鄣之故其害益暴及禹之治水也導之則其患息蓋患深勢盛則難與敵莫若馴致而去其害之易也今堯舜三代之政其説尚傳其具皆在誠能講而修之行之以勤而浸之以漸使民皆樂而趣焉則充乎天下而佛無所施矣傳曰物莫能兩大自然之勢也奚必曰火其書而廬其居哉昔者戎狄蠻夷雜居九州之間所謂徐戎白狄荆蠻淮夷之類是也三代既衰若此之類並進於中國故秦以西戎據宗周吳楚之國皆僣稱王春秋書用鄫子傳記被髮於伊川而仲尼亦以不左袵為幸當是之時佛雖不來中國幾何其不夷狄也以是而言之王道不明而仁義廢則夷狄之患至矣及孔子作春秋尊中國賤夷狄然後王道復明方今九州之民莫不右袵而冠帶其為患者特佛爾其所以勝之之道非有甚髙難行之説也患乎忽而不為爾夫郊天祀地與乎宗廟社稷朝廷之儀皆天子之大禮也今皆舉而行之至於所謂搜狩婚姻喪祭鄉射之禮此郡縣有司之事也在乎講明而頒布之爾然非行之以勤浸之以漸則不能入於人而成化自古王者之政必世而後仁今之議者將曰佛來千餘歲有力者尚無可奈何何用此迂緩之説為是則以一日之功不速就而棄必世之功不為也可不惜哉孔子歎為俑者不仁蓋嘆乎啓其漸而至於用殉也然則為佛者不猶甚於作俑乎當其始來未見其害引而內之今之為害著矣非待先覺之明而後見也然而恬然不以為怪者何哉夫物極則返數窮而變此理之常也今佛之盛久矣乘其窮極之時可以反而變之不難也昔三代之為政皆聖人之事業及其久也必有弊故三代之術皆變其質文而相救就使佛為聖人及其弊也猶將救之况其非聖人者乎夫姦邪之士見信於人者彼雖小人必有所長以取信是以古之人君惑之而至於亂亡而不悟今佛之法可謂姦且邪矣蓋其為説亦有可以惑人者使世之君子雖見其弊而不思救豈又善惑者歟抑亦不得其救之之術也救之莫若修其本以勝之捨是而將有為雖賁育之勇孟軻之辨太公之隂謀吾見其力未及施言未及出計未及行而先已陷於禍敗矣何則患深勢盛難與敵非馴致而為之莫能也故曰修其本以勝之作本論本論下讀之易使人委靡然而筆力皆藏在裏面了佛法為中國患千餘歲世之卓然不惑而有力者莫不欲去之已嘗去矣而復大集攻之暫破而愈堅撲之未滅而愈熾遂至於無可奈何是果不可去耶蓋亦未知其方也夫醫者之於疾也必推其病之所自來而治其受病之處病之中人乘乎氣虛而入焉則善醫者不攻其疾而務養其氣氣實則病去此自然之效也故救天下之患者亦必推其患之所自來而治其受患之處佛為夷狄去中國最逺而有佛固己久矣堯舜三代之際王政修明禮義之教充於天下於此之時雖有佛無由而入及三代衰王政闕禮義廢後二百餘年而佛至中國由是言之佛所以為吾患者乘其闕廢之時而來此其受患之本也補其闕修其廢使王政明而禮義充則雖有佛無所施於吾民矣此亦自然之勢也堯舜三代為政設為井田之法籍天下之人計其口而皆授之田凡人之力能勝耕者莫不有田而耕之斂以什一差其征役以督其不勤使天下之人力皆盡於南畝而不暇乎其他然又懼其勞且怠而入於邪僻也於是為制牲牢酒醴以養其體笙匏俎豆以悅其耳目於不耕休力之時而教之以禮故因其田獵而為搜狩之禮因其嫁娶而為婚姻之禮因其死葬而為喪祭之禮因其飲食羣聚而為鄉射之禮非徒以防其亂又因而教之使知尊卑長幼凡人之大倫也故凡養生喪死之道皆因其欲而為之制飾之物采而文焉所以悅之使其易趣也順其性情而節焉所以防之使其不過也然猶懼其未也又為立學以講明之故上自天子之郊下至鄉黨莫不有學擇民之聰明者而習焉使相告語而勸誘其愚惰嗚呼何其備也蓋堯舜三代之為政如此其慮民之意甚精治民之具甚備防民之術甚周誘民之道甚篤行之以勤而被於物者治浸之以漸而入於民者深故民之生也不用力乎南畝則從事於禮樂之際不在其家則在乎庠序之間耳聞目見無非仁義禮樂而趨之不知其倦終身不見異物又奚暇外慕哉故曰雖有佛無由而入者謂有此具也及周之衰秦并天下盡去三代之法而王道中絶後之有天下者不能勉強而為治之具不備防民之漸不周佛於此時乘間而出千有餘歲之間佛之來者日益衆吾之所為者日益壞井田最先廢而兼并遊惰之姦起其後所謂搜狩婚姻喪祭鄉射之禮凡所以教民之具相次而盡廢然後民之姦者有暇而為他其良者泯然不見禮義之及已夫姦民有餘力則思為邪僻良民不見禮義則莫知所趨佛於此而乘其隙方鼓其雄誕之説而牽之則民不得不從而歸矣又况王公大人往往唱而驅之曰佛是真可歸依者然則吾民何疑而不歸焉幸而有一不惑者方艴然怒曰佛何為者吾將操戈而逐之又曰吾將有説而排之何其不思之甚也夫千歲之患遍於天下豈一人一日之可為民之沉酣入於骨髓非口舌之可勝然則將奈何曰莫若修其本以勝之昔戰國之時楊墨交亂孟子患之而專言仁義故仁義之説勝則楊墨之學廢漢之時百家並興董生患之而退修孔氏之道故孔氏之道明而百家自息此所謂修其本以勝之之效也今八尺之夫被甲荷戟男蓋三軍然而見佛則拜聞佛之説則有畏慕之誠者何也彼誠壯佼其中心茫然無所守而然也一介之士眇然柔懦進趨畏怯然而聞有道佛者義形於色非徒不為之屈又欲驅而絶之者何也彼無他焉學問明而禮義熟中心有所守以勝之也然則禮義者勝佛之本也今一介之士知禮義尚能不為之屈使天下皆知禮義則勝之矣自然之勢也春秋論此一篇是反題格與韓文諌臣相類排斥之辭大抵要斥人須多方説教他無逃處此前數段可見殺逆大惡也其為罪也莫贖其於人也不容其在法也無赦法施於人雖小必謹况舉大法而加大惡乎既輒加之又輒赦之則自侮其法而人不畏春秋用法不如是之輕易也三子説春秋書趙盾以不討賊故加之大惡既而以盾非實弒則又復見乎經以明盾之無罪是輒加之而輒赦之爾以盾為無弒心乎其可輕以大惡加之以盾不討賊情可責而宜加之乎則其後頑然未嘗討賊既不改過以自贖何為遽赦使同無罪之人其於進退皆不可此非春秋意也趙穿殺君大惡也盾不討賊不能為君復讎而失刑於下二者輕重不較可知就使盾為可責然穿焉得免也今免首罪為善人使無辜者受大惡此決知其不然也春秋之法使為惡者不得幸免疑似者有所辨明此所謂是非之公也據三子之説初靈公欲殺盾盾走而免穿盾族也遂弒而盾不討其迹涉於與弒矣此疑似難明之事聖人尤當求情責實而明白之使盾果有弒心乎則自然罪在盾矣不得曰為法受惡而稱其賢也使果無弒心乎則當為之辨明必先正穿之惡使罪有所歸然後責盾縱賊則穿之大惡不可幸而免盾之疑似之迹獲辨而不討之責亦不得辭如此則是非善惡明矣今為惡者獲免而疑似之人陷于大惡此決知其不然也若曰盾不討賊有幸弒之心與自弒同故寧舍穿而罪盾此乃逆詐用情之吏矯激之為爾非孔子忠恕春秋以王道治人之法也孔子患舊史是非錯亂而善惡不明所以修春秋就令舊史如此其肯從而不正之乎其肯從而稱美又教人以越境逃惡乎此可知其謬傳也問者曰然則夷臯孰弒之曰孔子所書是矣趙盾弒其君也今有一人焉父病躬進藥而不嘗又有一人焉父病而不躬進藥而二父皆死又有一人焉操刃以殺其父使吏治之是三人者其罪同乎曰雖庸吏猶知其不可同也躬藥而不知嘗者有愛父之孝心而不習於禮是可哀也無罪之人爾不躬進藥者誠不孝矣雖無愛親之心然未有殺父之意使善治獄者猶當與操刃殊科况以躬藥之孝反與操刃同其罪乎此庸吏之不為也然則許世子止實不嘗藥則孔子決不書曰弒君孔子書為弒君則止決非不嘗藥難者曰聖人借止以垂教爾對曰不然夫所謂借止垂教者不過欲人之知嘗藥爾聖人一言明以告之則萬世法也何必加孝子以大惡之名而嘗藥之事卒不見于文使後世但知止為弒君而莫知藥之當嘗也教未可垂而已陷人於大惡矣聖人垂教不如是之迂也果曰責止不如是之刻也難者曰曷為盾復見于經許悼公曷為書葬曰弒君之臣不見經此自三子説爾果聖人法乎悼公之葬且安知其不討賊而書葬也自止以弒見經後四年吳敗許師又十有八年當定公之四年許男始見于經而不名許之書于經者略矣止之事迹不可得而知也難者曰三子之説非其臆出也其得於所傳如此然則所傳者皆不可信乎曰傳聞何可盡信公羊穀梁以尹氏卒為正卿左氏以尹氏卒為隱母一以為男子一以為婦人得於所傳者蓋如此是可盡信乎繳結極好移易不動與泰誓同春秋論中孔子何為而修春秋正名以定分求情而責實别是非明善惡此春秋之所以作也自周衰以來臣弒君子弒父諸侯之國相屠戮而爭為君者天下皆是也當是之時有一人焉能好廉而知讓立乎爭國之亂世而懷讓國之髙節孔子得之於經宜如何而别白之宜如何而褒顯之其肯沒其攝位之實而雷同衆君誣以為公乎所謂攝者臣行君事之名也伊尹周公共和之臣常攝矣不聞商周之人謂之王也使息姑實攝而稱號無異於正君則名分不正而是非不别夫攝者心不欲為君而身假行君之事雖行君事而其實非君也今書曰公則是息姑心不欲之實不為之而孔子加之失其本心誣以虛名而沒其實善夫不求其情不責其實而善惡不明如此則孔子之意疏而春秋謬矣春秋辭有同異尤謹嚴而簡約所以别嫌明微慎重而取信其於是非善惡難明之際聖人所盡心也息姑之攝也會盟征伐賞刑祭祀皆出於已舉魯之人皆聽命於已其不為正君者幾何惟不有其名爾使其名實皆在已則何從而知其攝也故息姑之攝與不攝惟在為公與不為公别嫌明微繫此而已且其有讓桓之志未及行而見殺其生也志不克伸其死也被虛名而違本意則息姑之恨何伸於後世乎甚髙之節難明之善亦何望於春秋乎今説春秋者皆以名字氏族與奪為輕重故曰一字為褒貶且公之為字豈不重於名字氏族乎孔子以名字氏族不妄以加人其肯以公妄加於人而沒其實乎以此而言隱實為攝則孔子決不書曰公孔子書為公則隱決非攝難者曰然則何為不書即位曰惠公之終不見其事則隱之始立亦不可知孔子從二百年後得其遺書而修之闕其所不知所以傳後也難者又曰謂為攝者左氏爾公羊穀梁皆以為假立以待桓也故得以假稱公豫曰凡魯之事出於已舉魯之人聽於已生稱曰公死稱曰葬何從而知其假泰誓論鋪敘不困解説分明書稱商始咎周以乘黎乘黎者西伯也西伯以征伐諸侯為職事其伐黎而勝也商人已疑其難制而患之使西伯赫然見其不臣之狀與商並立而稱王如此十年商人反晏然不以為怪其父師老臣如祖伊微子之徒亦默然相與熟視而無一言此其近於人情耶由是言之謂西伯受命稱王十年者妄説也以紂之雄猜暴虐嘗醢九侯而脯鄂侯矣西伯聞之竊嘆遂執而囚之幾不免死至其叛已不臣而自王乃反優容而不問者十年此豈近於人情耶由是言之謂西伯受命稱王十年者妄説也孔子曰三分天下有其二以服事商使西伯不稱臣而稱王安能服事於商乎且謂西伯稱王者起於何説而孔子之言萬世之信也由是言之謂西伯受命稱王十年者妄説也伯夷叔齊古之知義之士也方其讓國而去顧天下皆莫可歸聞西伯之賢共往歸之當是時紂雖無道天子也天子在上諸侯不稱臣而稱王是僣叛之國也然二子不以為非依之久而不去至武王伐紂始以為非而棄去彼二子者始顧天下莫可歸卒依僣叛之國而不去不非其父而非其子此豈近於人情耶由是言之謂西伯受命稱王十年者妄説也書之泰誓稱十有一年説者因以謂自文王受命九年及武王居喪二年并數之爾是以西伯聽虞芮之訟謂之受命以為元年此又妄説也古者人君即位必稱元年常事爾不以為重也後世曲學之士説春秋始以改元為重事然則果常事歟固不足道也果重事歟西伯即位已改元矣中間不宜改元而又改元至武王即位宜改元而反不改元乃上冒先君之元年并其居喪稱十一年及其滅商而得天下其事大於聽訟逺矣又不改元由是言之謂西伯以受命之年為元年者妄説也後之學者知西伯生不稱王而中間不再改元則詩書所載文武之事粲然明白而不誣矣或曰然則武王畢喪伐紂而泰誓曷為稱十有一年對曰畢喪伐紂出於諸家之小説而泰誓六經之明文也昔者孔子當衰周之際患衆説紛紜以惑亂當世於是退而修六經以為後世法及孔子既殁去聖稍逺而衆説復興與六經相亂自漢以來莫能辨正今有卓然之士一取信乎六經則泰誓者武王之事也十有一年者武王即位之十有一年爾復何疑哉司馬遷作周本紀雖曰武王即位也九年祭於文王之墓然後治兵於孟津至作伯夷列傳則又載父死不葬之説皆不可為信是以吾無取焉取信于書可矣繳結極好移易不動與春秋論結同上范司諌書太率平正有眼目筋骨須看前後貫穿錯綜抑揚處月日具官謹齋沐拜書司諌學士執事前月中得進奏吏報云自陳州召至闕拜司諌即欲為一書以賀多事匆卒未能也司諌七品官爾於執事得之不為喜而獨區區欲一賀者誠以諌官者天下之得失一時之公議繫焉今世之官自九卿百執事外至一郡縣吏非無貴官大職可以行其道也然縣越其封郡逾其境雖賢守長不得行以其有守也吏部之官不得理兵部鴻臚之卿不得理光祿以其有司也若天下之得失生民之利害社稷之大計惟所見聞而不繫職司者獨宰相可行之諌官可言之爾故士學古懷道者仕於時不得為宰相必為諌官諌官雖卑與宰相等天子曰不可宰相曰可天子曰然宰相曰不然坐乎廟堂之上與天子相可否者宰相也天子曰是諌官曰非天子曰必行諌官曰必不可行立殿陛之前與天子爭是非者諌官也宰相尊行其道諌官卑行其言言行道亦行也九卿百司郡縣之吏守一職者任一職之責宰相諌官繫天下之事亦任天下之責然宰相九卿而下失職者受責於有司諌官之失職也取譏於君子有司之法行乎一時君子之譏著之簡册而昭明垂之百世而不泯甚可懼也夫七品之官任天下之責懼百世之譏豈不重耶非材且賢者不能為也近執事始被召於陳州洛之士大夫相與語曰我識范君知其材也其來不為御史必為諌官及命下果然則又相與語曰我識范君知其賢也他日聞有立天子陛下直辭正色面爭廷論者非他人必范君也拜命以來翹首企足佇乎有聞而卒未能也竊惑之豈洛之士大夫能料於前而不能料於後也將執事有待而為也昔韓退之作諍臣論以譏陽城不能極諌卒以諌顯人皆謂城之不諌蓋有待而然退之不識其意而妄譏修獨以為不然當退之作論時城為諌議大夫已五年後又二年始廷論陸贄及阻裴延齡作相欲裂其麻才兩事爾當德宗時可謂多事矣授受失宜叛將強臣羅列天下又多猜忌進任小人於此之時豈無一事可言而須七年耶當時之事豈無急於阻延齡論陸贄兩事也謂宜朝拜官而夕奏疏也幸而城為諌官七年適遇延齡陸贄事一諌而罷以塞其責向使止五年六年而遂遷司業是終無一言而去也何所取哉今之居官者率三歲而一遷或一二歲甚者半歲而遷也此又非可以待乎七年也今天子躬親庶政化理清明雖為無事然自千里詔執事而拜是官者豈不欲聞正議而樂讜言乎然今未聞有所言説使天下知朝廷有正士而彰吾君有納諌之明也夫布衣韋帶之士窮居草茅坐誦書史常恨不見用及用也又曰彼非我職不敢言或曰我位猶卑不得言得言矣又曰我有待是終無一人言也可不惜哉伏惟執事思天子所以見用之意懼君子百世之譏一陳昌言以塞重望且解洛之士大夫之惑則幸甚幸甚送徐無黨南歸序此篇文字象一箇階級自下説上一級進一級草木鳥獸之為物衆人之為人其為生雖異而為死則同一歸於腐壞澌盡泯滅而已而衆人之中有聖賢者固亦生且死於其間而獨異於草木鳥獸衆人者雖死而不朽愈逺而彌存也其所以為聖賢者修之於身施之於事見之於言是三者所以能不朽而存也修於身者無所不獲施於事者有得有不得焉其見於言者則又有能有不能也施於事矣不見於言可也自詩書史記所傳其人豈必皆能言之士哉修於身矣而不施於事不見於言亦可也孔子弟子有能政事者矣有能言語者矣若顔回者在陋巷曲肱飢卧而已其羣居則默然終日如愚人然自當時羣弟子皆推尊之以為不敢望而及而後世更百千歲亦未有能及之者其不朽而存者固不待施於事况於言乎豫讀班固藝文志唐四庫書目見其所列自三代秦漢以來著書之士多者至百餘篇少者猶三四十篇其人不可勝數而散亡磨滅百不一二存焉豫竊悲其人文章麗矣言語工矣無異草木榮華之飄風鳥獸好音之過耳也方其用心與力之勞亦何異衆人之汲汲營營而忽焉以死者雖有遲有速而卒與三者同歸於泯滅夫言之不可恃也蓋如此今之學者莫不慕古聖賢之不朽而勤一世以盡心於文字間者皆可悲也東陽徐生少從豫學為文章稍稍見稱於人既去而與羣士試于禮部得髙第由是知名其文辭日進如水湧而山出豫欲摧其盛氣而勉其思也故於其歸告以是言然豫固亦喜為文辭者亦因以自警焉送王陶序凡文字用易象多失之陳此篇使得疏通不陳窒塞處能疏通六經皆載聖人之道而易著聖人之用吉凶得失動靜進退易之事也其所以為之用者剛與柔也乾健坤順剛柔之大用也至於八卦之變六爻之錯剛與柔迭居其位而吉亨利無咎凶厲悔吝之象生焉蓋剛為陽為德為君子柔為隂為險為小人自乾之初九為姤而上至於剝其卦五皆隂剝陽之卦也小人之道長君子靜以退之時也自坤之初六為復而上至於夬其卦五皆剛決柔之卦也小人之道消君子動以進而用事之時也夫剛之為德君子之常用也庇民利物功莫大焉其為卦過泰之三而四為大壯五為夬壯者壯也夬者決也四陽雖盛而猶有二隂然陽衆而隂寡則可用壯以攻之故其卦為壯五陽而一隂隂不足為直可決之而已故其卦為夬然則君子之用其剛也審其力視其時知隂險小人之必可去然後以壯而決之夫勇者可犯也強者可詘也聖人於壯決之用必有戒焉故大壯之彖辭曰大壯利正其象辭曰君子非禮弗履夬之彖辭曰健而説決而和其象辭曰居德則忌以明夫剛之不可獨任也故復始而亨臨浸而長泰交而大壯以衆攻其寡夬乘其衰而決之夫君子之用其剛也有漸而不失其時又不獨任必以正以禮以説以和而濟之則功可成此君子動以進而用事之方也太原王陶字樂道好剛之士也常嫉世隂險而小人多居京師不妄與人遊力學好古以自信自守今其初仕於易得君子動以進之象故豫為剛説以贈之大壯之初九曰壯于趾征凶夬之初九亦曰壯于趾往不勝為咎以此見聖人之戒用剛也不獨於其彖象而又常深戒於其初嗚呼世之君子少而小人多君之力學好剛以蓄其志未始施之於事也今其往尤宜慎乎其初結最有力依前結歸初字古文關鍵卷上
