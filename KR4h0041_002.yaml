body:
  text: 古文關鍵卷下宋吕祖謙撰老蘇文春秋論此篇須看首尾相應枝葉相生如引繩貫珠大抵一節未盡又生一節别人意多則雜惟此篇意多而不雜六句應接淂緊切自此振發公私二字是一篇本意賞罰者天下之公也是非者一人之私也位之所在則聖人以其權為天下之公而天下以懲以勸道之所在則聖人以其權為一人之私而天下以榮以辱周之衰也位不在夫子而道在焉夫子以其權是非天下可也而春秋賞人之功赦人之罪去人之族絶人之國貶人之爵諸侯而或書其名大夫而或書其字不惟其法惟其意不徒曰此是此非而賞罰加焉則夫子固曰我可以賞罰人矣賞罰人者天子諸侯事也夫子病天下之諸侯大夫僣天子諸侯之事而作春秋而已則為之其何以責天下位公也道私也私不勝公則道不勝位位之權得以賞罰而道之權不過於是非道在我矣而不淂為有位者之事則天下皆曰位之不可僣也如此不然天下其誰不曰道在我則是道者位之賊也曰夫子豈誠賞罰之耶徒曰賞罰之耳庸何傷曰我非君也非吏也執塗之人而告之曰某為善某為惡可也繼之曰某為善吾賞之某為惡吾罰之則人有不笑我者乎夫子之賞罰何以異此然則何足以為夫子何足以為春秋曰夫子之作春秋也非曰孔氏之書也又非曰我作之也賞罰之權不以自與也曰此魯之書也魯作之也有善而賞之曰魯賞之也有惡而罰之曰魯罰之也何以知之曰夫子繫易謂之繫辭言孝謂之孝經皆自名之則夫子私之也而春秋者魯之所以名史而夫子託焉則夫子公之也公之以魯史之名則賞罰之權固在魯矣春秋之賞罰自魯而及于天下天子之權也魯之賞罰不出境而以天子之權與之何也曰天子之權在周夫子不得已而以與魯也武王之崩也天子之位當在成王而成王幼周公以為天下不可以無賞罰故不得已而攝天子之位以賞罰天下以存周室周之東遷也天子之權當在平王而平王昏亂故夫子亦曰天下不可無賞罰而魯周公之國也居魯之地者宜如周公不得已而假天子之權以賞罰天下以尊周室故以天子之權與之也然則假天子之權宜如何曰如齊桓晉文可也夫子欲魯如齊桓晉文而不遂以天子之權與齊晉者何也齊桓晉文陽為尊周而實欲富強其國故夫子與其事而不與其心周公心存王室雖其子孫不能繼而夫子思周公而許其假天子之權以賞罰天下其意曰有周公之心而後可以行桓文之事此其所以不與齊晉而與魯也夫子亦知魯君之才不足以行周公之事矣顧其心以為今之天下無周公故至此是故以天子之權與其子孫所以見思周公之意也吾觀春秋之法皆周公之法而又詳內而略外此其意於魯法周公之所為且先自治而後治人也明矣夫子嘆禮樂征伐自諸侯出而田常弒其君則沭浴而請討然則天子之權夫子固明以與魯也子貢之徒不逹夫子之意續經而書孔丘卒夫子既告老矣大夫告老而卒不書而夫子獨書夫子作春秋以公天下而豈私一孔丘哉嗚呼夫子以為魯國之書而子貢之徒以為孔子之書也歟遷固之史有是非而無賞罰彼亦史臣之體宜爾也後之效夫子作春秋者吾惑焉春秋有天子之權天下有君則春秋不當作天下無君則天子之權吾不知其誰與天下之人烏有如周公之後之可與者與之而不淂其人則亂不與人而自與則僣不與人不自與而無所與則散嗚呼後之春秋亂耶僣耶散耶結有力管仲論老蘇大率多是權書惟此文句句的當前亦可學後不可到此篇義理的當抑揚反覆及警䇿處多管仲相桓公霸諸侯攘戎狄終其身齊國富強諸侯不叛管仲死竪刁易牙開方用桓公薨於亂五公子爭立其禍蔓延訖簡公齊無寧嵗夫功之成非成於成之之日蓋必有所由起禍之作不作於作之之日亦必有所由兆則齊之治也吾不曰管仲而曰鮑叔及其亂也吾不曰竪刁易牙開方而曰管仲何則竪刁易牙開方三子彼固亂人國者顧用之者桓公也夫有舜而後知放四凶有孔子而後知去少正卯彼桓公何人也顧其使桓公得用三子者管仲也仲之疾也公問之相當是時也吾以仲且舉天下之賢者以對而其言乃不過曰竪刁易牙開方三子非人情不可近而已嗚呼仲以為桓公果能不用三子矣乎仲與桓公處幾年矣亦知桓公之為人矣乎桓公聲不絶乎耳色不絶乎目而非三子者則無以遂其欲彼其初之所以不用者徒以有仲焉耳一日無仲則三子者可以彈冠相慶矣仲以為將死之言可以縶桓公之手足耶夫齊國不患有三子而患無仲有仲則三子者三匹夫耳不然天下豈少三子之徒雖桓公幸而聼仲誅此三人而其餘者仲能悉數而去之耶嗚呼仲可謂不知本者矣因桓公之問舉天下之賢以自代則仲雖死而齊國未為無仲也夫何患三子者不言可也五霸莫盛于桓文文公之才不過桓公其臣又皆不及仲靈公之虐不若孝公之寬厚文公死諸侯不敢叛晉晉襲文公之餘威淂為諸侯之盟主百有餘年何者其君雖不肖而尚有老成人焉桓公之死也一亂塗地無惑也彼獨恃一管仲而仲則死矣夫天下未嘗無賢者蓋有有臣而無君者矣桓公在焉而曰天下不復有管仲者吾不信也仲之書有記其將死論鮑叔賔胥無之為人且各疏其短是其心以為是數子者皆不足以託國而又逆知其將死則其書誕謾不足信也吾觀史鰍以不能進蘧伯玉而退彌子瑕故有身後之諌蕭何且死舉曹參以自代大臣之用心固宜如此也一國以一人興以一人亡賢者不悲其身之死而憂其國之衰故必復有賢者而後可以死彼管仲者何以死哉髙祖論此篇須看抑揚反覆過接處將無作有以虗為實漢髙祖挾數用術以制一時之利害不如陳平揣摩天下之勢舉足搖目以劫制項羽不如張良微此二人則天下不歸漢而髙帝乃木強之人而止耳然天下已定後世子孫之計陳平張良智之所不及則髙帝常先為之規畫處置以中後世之所為曉然如目見其事而為之者蓋髙帝之智明於大而暗於小至於此而後見也帝嘗語吕后曰周勃重厚少文然安劉氏必勃也可令為太尉方是時劉氏既安矣勃又將誰安耶故臣之意曰髙帝之以太尉屬勃也知有吕氏之禍也雖然其不去吕后何也勢不可也昔者武王沒成王幼而三監叛帝意百嵗後將相大臣及諸侯王有如武庚祿父者而無有以制之也獨計以為家有主母而豪奴悍婢不敢與弱子抗吕氏佐帝定天下為大臣素所畏服獨此可以鎮壓其邪心以待嗣子之壯故不去吕后者為惠帝計也吕后既不可去故削其黨以損其權使雖有變而天下不搖是故以樊噲之功一旦遂欲斬之而無疑嗚呼彼獨於噲不仁耶且噲與帝偕起拔城陷陳功不為少矣方亞父嗾項莊時微噲譙羽則漢之為漢未可知也且人有惡噲欲滅戚氏者時噲出伐燕立命平勃即軍中斬之夫噲罪未形也惡之者誠偽未必也且帝之不以一女子斬天下功臣亦明矣彼其娶於吕氏吕氏之族若産祿輩皆庸才不足恤獨噲豪健諸將所不能制後世之患無大於此矣夫髙帝之視吕后猶醫者之視堇也使其毒可以治病而無至於殺人而已樊噲死則吕氏之毒將不至於殺人髙帝以為是足以死而無憂矣彼平勃者遺其憂者也噲之死於惠之六年也天也彼其尚在則吕祿不可紿太尉不得入北軍矣或謂噲於帝最親使之尚在未必與産祿叛夫韓信黥布盧綰皆南面稱孤而綰又最為親幸然及髙祖之未亡也皆相繼以逆誅誰謂百嵗之後椎埋屠狗之人見其親戚得為帝王而不欣然從之耶臣故曰彼平勃者遺其憂者也審勢治天下者定所上所上一定至於千萬年而不變使民之耳目純於一而子孫有所守易以為治故三代聖人其後世逺者至七八百年夫豈惟其民之不忘其功以至於是蓋其子子孫孫得其祖宗之法而為據依可以永久夏之上忠商之上質周之上文視天下之所宜上而固執之以此而始以此而終不朝文而莫質以自潰亂故聖人者出必先定一代之所上周之世蓋有周公為之制禮而天下遂尚文後世有賈誼者説漢文帝亦欲先定制度而其説不可用今者天下幸方治安子孫萬世帝王之計不可不預定於此時然萬世帝王之計常先定所上使其子孫可以安坐而守其舊至于政弊然後變其小節而其大體卒不可革易故享世長逺而民不苟簡今也考之於朝野之間以觀國家之所上者而臣猶有惑也何則天下之勢有強弱聖人審其勢而應之以權勢強矣強甚而不已則折勢弱矣弱甚而不已則屈聖人權之使其甚不至於折與屈者威與惠也夫強甚者威竭而不振弱甚者惠褻而下不以為德故處弱者利用威而處強者利用惠乘強之威以行惠則惠尊乘弱之惠以飬威則威發而天下震栗故威與惠者所以裁節天下強弱之勢也然而不知強弱之勢者有殺人之威而下不懼有生人之惠而下不喜何者威竭而惠褻故也故有天下者必先審知天下之勢而後可與言用威惠不先審知其勢而徒曰我能用威我能用惠者末也故有強而益之以威弱而益之以惠以至於折與屈者是可悼也譬之一人之身將欲飲藥餌石以養其生必先審觀其性之為隂其性之為陽而投之以藥石藥石之陽而投之隂藥石之隂而投之陽故隂不至於涸而陽不至於亢苟不能先審觀已之為隂與已之為陽而以隂攻隂以陽攻陽則隂者固死於隂陽者固死於陽不可救也是以善養身者先審其隂陽而善制天下者先審其強弱以為之謀昔者周有天下諸侯大盛當其盛時大者已有土地五百里而畿內反不過千里其勢為弱秦有天下散為郡縣聚為京師守令無大權柄伸縮進退無不在我其勢為強然方其成康在上諸侯無小大莫不臣服弱之勢未見於外及其後世失德而諸侯禽奔獸遁各固其國以相侵攘而其上之人卒不悟區區守姑息之道而望其能以制服強國是謂以弱政濟弱勢故周之天下卒斃於弱秦自孝公其勢固以駸駸焉日趨於強大及其子孫已并天下而亦不悟專任法制以斬撻平民是謂以強政濟強勢故秦之天下卒斃於強周拘於惠而不知權秦勇於威而不知本二者皆不審天下之勢也我宋制治有縣令有郡守有轉運使以大總小絲牽繩聯總合於上雖其地在萬里外方數千里擁兵百萬而天子一呼於殿陛間三尺竪子馳傳捧詔召而歸之京師則解印趨走惟恐不及如此之勢秦之所恃以強之勢也勢強矣然天下之病常病於弱噫有可強之勢如秦而反陷於弱者何也習於惠而怯於威也惠大甚而威不勝也夫其所以習於惠而惠大甚者賞數而加於無功也怯於威而威不勝者刑弛而兵不振也由賞與刑與兵之不得其道是以有弱之實著於外焉何謂弱之實曰官吏曠惰職廢不舉而敗官之罰不加嚴也多贖數赦不問有罪而典刑之禁不能行也冗兵驕彺負力幸賞而維持姑息之恩不敢節也將帥覆軍匹夫不返而敗軍之責不加重也羌胡強盛陵壓中國而邀金繒幣帛之耻不為怒也若此類者大弱之實也久而不治則又將有大於此而遂浸微浸消釋然而潰以至於不可救止者乘之矣然臣以為弱在於政而不在於勢是謂以弱政敗強勢今夫一輿薪之火衆人之所憚而不敢犯者也舉而投之河則何熱之能為是以負強秦之勢而溺於弱周之弊而天下不知其強焉者以此也雖然政之弱非若勢弱之難治也借如弱周之勢而必變易其諸侯而後強可能也天下之諸侯固未易變此又非一日之故也若夫弱政則用威而已矣可以朝改而夕定也夫齊古之強國也而威王又齊之賢王也當其即位委政不治諸侯並侵而人不知其國之為強國也一旦發怒裂萬家封即墨大夫召烹阿大夫與常譽阿大夫者而發兵擊趙魏衛趙魏衛盡走請和而齊國人人震懼不敢飾非者彼誠知其政之弱而能用其威以濟其弱也况今以天子之尊藉郡縣之勢言脫於口而四方響應其所以用威之資固己完具且有天下者患不為焉未有欲為而不可者今誠能一留意於用威一賞罰一號令一舉動無不一切出於威嚴用刑法而不赦有罪力行果斷而不牽衆人之是非用不測之刑用不測之賞而使天下之人視之如風雨雷霆遽然而至截然而下不知其所從發而不可逃遁朝廷知此然後平民益務撿慎而姦民猾吏亦常恐恐然懼刑法之及其身而斂其手足不敢輒犯法此之謂強政強政矣為之數年而天下之勢可以復強臣故曰乘弱之惠以養威則威發而天下震栗然則以當今之勢求所謂萬世為帝王而其大體卒不可革易者其尚威而已矣或曰當今之勢事誠無便於尚威者然孰知夫萬世之間其政不變而必曰威耶愚應之曰威者君之所恃以為君者也一日而無威是無君也久而政弊變其小節而參之以惠使不至若秦之甚可也舉而棄之過矣或者又曰王者任德不任刑任刑伯者之事非所宜言此又非所謂知理者也夫湯武皆王也桓文皆伯也武王乘紂之暴出民於炮烙斬刈之地苟又遂多殺人多刑人以為治則民之心去矣故其治一出於禮義彼湯則不然桀之惡固無以異於紂然其刑不若紂暴之甚也天下之民化之其風淫惰不事法度書曰有衆率怠弗協而又諸侯昆吾氏首為亂於是誅鋤其強梗怠惰不法之人以定紛亂故記曰商人先罰而後賞至於桓文之事則又非皆任刑也桓公任管仲管仲之書好言刑故桓公之治常任刑文公長者其佐狐趙先魏皆不説以刑法其治亦未嘗以刑為本而號亦為伯而謂湯非王而文非伯也得乎故用刑不必伯用德不必王各觀其勢之何所宜用而已然則今之勢何為不可用刑何為不曰王道彼不先審天下之勢而欲應天下之務難矣上富丞相書此篇須看曲折抑揚開合反覆節奏好往年天子震怒出逐宰相選用舊臣堪付屬以天下者使在宰府與天下更始而閣下之位實在第三方是之時天下咸喜相慶以為閣下惟不為宰相也故默默在此方今困而復起起而復為宰相而又適值乎此時也不為而何為且吾君之意待之如此其厚也不為而何以副吾望故咸曰後有下令而異於他日者必吾富公也朝夕而待之跂首而望之望望然而不獲見也戚戚然而疑嗚呼其弗獲聞也必其逺也進而及於京師亦無聞焉不敢以疑猶曰天下之人如此其衆也數十年之間如此其不變也皆曰賢人焉或者彼其中則有説也而天下之人則未始見也然不能無憂蓋古之君子愛其人也則憂其無成且嘗聞之古之君子相是君也與是人也皆立於朝則使吾皆知其為人皆善者也而後無憂且一人之身而欲擅天下之事雖見信於當世而同列之人一言而疑之則事不可以成今夫政出於他人而不懼事不出於已而不忌是二者惟善人為能然猶欲得其心焉若夫衆人政出於他人而懼其害己事不出於已而忌其成功是以有不平之心生夫或居於吾前或立於吾後而皆有不平之心焉則身危故君子之處於其間也不使之不平於我也周公立於明堂以聽天下而召公惑何者天下固惑乎大也召公猶未能信乎吾之心也周公定天下誅管蔡告召公以其志以安其身以及於成王故凡安其身者以安乎周也召公之於周公管蔡之於周公二者亦皆有不平之心焉以為周之天下周公將遂取之也周公誅其不平而不可告語者告其可以告語者而和其不平之心然則非其必不可告語者則君子未始不欲和其心天下之人從仕而至於卿大夫宰相集處其上將有所為何慮而不成不能忍其區區之小忿以成其不平之釁則害其大事是以君子忍其小忿以容其小過而杜其不平之心然後當大事而聽命焉且吾之小忿不足以易吾之大事也故寧小容焉使無芥蒂於其間古之君子與賢者並居而同樂故其責之也詳不幸而與不肖者偶不圖其大而治其細則闊逺於事情而無益於當世故天下無事而後可與爭此不然則否昔者諸吕用事陳平憂懼計無所出陸賈入見説之使交歡周勃陳平用其䇿卒得絳侯北軍之助以滅諸吕夫絳侯木強之人也非陳平而致之誰也故賢人者致其不賢者也非夫不賢者之能致賢者也曩者今上即位之初寇萊公為相惟其側有小人不能誅又不能與之無忿故終以斥去及范文正公在相府又欲以嵗月治天下事失於急與不忍小忿故羣小人亦急逐去之一去遂不復用以殁其身伏惟閣下以不世出之才立於天子之下百官之上此其深謀逺慮必有所處而天下之人猶未獲見洵西蜀人也竊有志於今世願一見於堂上伏惟閣下深思之無忽上田樞密書天之所以與我者夫豈偶然哉堯不得以與丹朱舜不得以與商均而瞽瞍不得奪諸舜發於其心出於其言見於其事確乎其不可易也聖人不得以與人父不得奪諸其子於此見天之所以與我者不偶然也夫其所以與我者必有以用我也我知之不得行之不以告人天固用之我實置之其名曰棄天自卑以求幸其言自小以求用其道天之所以與我者何如而我如此也其名曰褻天棄天我之罪也褻天亦我之罪也不棄不褻而人不我用不我用之罪也其名曰逆天然則棄天褻天者其責在我逆天者其責在人在我者吾將盡吾力之所能為者以塞夫天之所以與我之意而求免乎天下後世之譏在人者吾何知焉吾求免夫一身之責之不暇而暇為人憂乎哉孔子孟軻之不遇老於道塗而不倦不愠不怍不沮者夫固知夫責之所在也衛靈魯哀齊宣梁惠之徒不足相與以有為也我亦知之矣抑將盡吾心焉耳吾心之不盡吾恐天下後世無以責夫衛靈魯哀齊宣梁惠之徒而彼亦將有以辭其責也然則孔子孟軻之目將不瞑於地下矣夫聖人賢人之用心也固如此如此而生如此而死如此而貧賤如此而富貴升而為天沉而為淵流而為川止而為山彼不預吾事吾事畢矣切怪夫後之賢者之不能自處其身也飢寒困窮之不勝而號於人嗚呼使吾誠死於飢寒困窮耶則天下後世之責將必有在彼其身之責不自任以為憂而我取而加之吾身不已過乎今洵之不肖何敢以自列於聖賢然其心亦有所不甚自輕者何則天下之學者孰不欲一蹴而造聖人之域然及其不成也求一言之幾乎道而不可得也千金之子可以貧人可以富人非天之所與雖以貧人富人之權求一言之幾乎道不可得也天子之宰相可以生人可以殺人非天之所與雖以生人殺人之權求一言之幾乎道不可得也今洵用力於聖人賢人之術亦已久矣其言語其文章雖不識其果可以有用於今而傳於後與否獨怪夫其得之之不勞方其致思於心也若或起之得之心而書之紙也若或相之夫豈無一言之幾於道千金之子天子之宰相求而不得者一旦在已故其心得以自負或者天其亦有以與我也曩者見執事於益州當時之文淺狹可笑飢寒困窮亂其心而聲律記問又從而破壞其體不足觀也已數年來退居山野自分永棄與世俗日踈闊得以大肆其力於文章詩人之優柔騷人之清深孟韓之溫淳遷固之雄剛孫吳之簡切投之所向無不如意嘗試以為董生得聖人之經其失也流而為迂朝錯得聖人之權其失也流而為詐有二子之才而不流者其為賈生乎惜乎今之世愚未見其人也作䇿二道曰審勢審敵作書十篇曰權書洵有山田一頃非凶嵗可以無飢力耕而節用亦足以自老不肖之身不足惜而夭之所與者不忍棄且不敢褻也執事之名滿天下天下之士用與不用在執事故敢以所為䇿二道權書十篇為獻平生之文遠不可多致有洪範論史論十篇近以獻內翰歐陽公度執事與之朝夕相從而議天下之事則斯文也其亦庶乎得陳於前矣若夫其言之可用與其身之可貴與否者執事事也執事責也於洵何有哉東坡文荀卿論此篇前罵後略取綱目在不敢放言上靣平説來雖是平説如有規矩一句亦有句法嘗讀孔子世家觀其言語文章循循莫不有規矩不敢放言髙論言必稱先王然後知聖人憂天下之深也茫乎不知其畔岸而非遠也浩乎不知其津涯而非深也其所言者匹夫匹婦之所共知而所行者聖人有所不能盡也嗚呼是亦足矣使後世有能盡吾説者雖為聖人無難而不能者不失為寡過而已矣子路之勇子貢之辨冉有之智此三者皆天下之所謂難能而可貴者也然三子者每不為夫子之所説顔淵默然不見其所能若無以異於衆人者而夫子亟稱之且夫學聖人者豈必其言之云哉亦觀其意之所嚮而已夫子以為後世必有不足行其説者矣必有竊其説而為不義者矣是故其言平易正直而不敢為非常可喜之論要在於不可易也昔者常怪李斯事荀卿既而焚滅其書大變古先聖王之法於其師之道不啻若冦讎及今觀荀卿之書然後知李斯之所以事秦者皆出於荀卿而不足怪也荀卿者喜為異説而不讓敢為髙論而不顧者也其言愚人之所驚小人之所喜也子思孟軻世之所謂賢人君子也荀卿獨曰亂天下者子思孟軻也天下之人如此其衆也仁人義士如此其多也荀卿獨曰人性惡桀紂性也堯舜偽也由是觀之意其為人必也剛愎不遜而自許太過彼李斯者又特甚者耳今夫小人之為不善猶必有顧忌是以夏商之亡桀紂之殘暴而先王之法度禮樂刑政猶未至於絶滅而不可考者是桀紂猶有所存而不敢盡廢也彼李斯者獨能奮而不顧焚燒夫子之六經烹滅三代之諸侯破壞周公之井田此亦必有所恃者矣彼見其師厯詆天下之賢人以自是其愚以為古先聖王皆無足法者不知荀卿特以快一時之論而荀卿亦不知其禍之至於此也其父殺人報仇其子必且行劫荀卿明王道述禮樂而李斯以其學亂天下其髙談異論有以激之也孔孟之論未嘗異也而天下卒無有及者苟天下果無有及者則尚安以求異為哉此篇文前面説荀卿不好了後面略放一步異他言荀卿亦是箇賢者大抵作文體式要如此頭使孔子起後仍舊使孔子結又見文字不苟亦自相應子思論昔者夫子之文章非有意於為文是以未嘗立論也所可得而言者惟其歸於至當斯以為聖人而已矣夫子之道可由而不可知可言而不可議此其不爭為區區之論以開是非之端是以獨得不廢以與天下後世為仁義禮樂之主夫子既沒諸子之欲為書以傳於後世者其意皆存乎為文汲汲乎惟恐其汨沒而莫吾知也是故皆喜立論論立而爭起自孟子之後至於荀卿揚雄皆務為相攻之説其餘不足數者紛紜於天下嗟夫夫子之道不幸而有老聃莊周楊朱墨翟田駢愼到申不害韓非之徒各持其私説以攻乎其外天下方將惑之而未知所適從奈何其弟子門人又內自相攻而不決千載之後學者愈衆而夫子之道益晦而不明者由此之故歟昔三子之爭起於孟子孟子曰人之性善是以荀子曰人之性惡而揚子又曰人之性善惡混孟子既已據其善是故荀子不得不出於惡人之性有善惡而已二子既已據之是以揚子亦不得不出於善惡混也為論不求其精而務以為異於人則紛紛之説未可以知其所止且夫夫子未嘗言性也蓋亦嘗言之矣而未有必然之論也孟子之所謂性善者皆出於其師子思之書子思之書皆聖人之微言篤論孟子得之而不善用之能言其道而不知其所以為言之名舉天下之大而必之以性善之論昭昭乎自以為的於天下使天下之過者莫不欲援弓而射之故夫二子之為異論者皆孟子之過也若夫子思之論則不然曰夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉君子之道造端乎夫婦之所能行而極乎聖人之所不能知造端乎夫婦之所能行是以天下無不可學而極乎聖人之所不能知是以學者不知其所窮夫如是則惻隱足以為仁而仁不止於惻隱羞惡足以為義而義不止於羞惡此不亦孟子之所以為性善之論歟子思論聖人之道出於天下之所能行而孟子論天下之人皆可以行聖人之道此無以異者而子思取必於聖人之道孟子取必於天下之人故夫後世之異議皆出於孟子而子思之論天下同是而莫非焉然後知子思之善為論也韓非論聖人之所為惡夫異端盡力而排之者非異端之能亂天下而天下之亂所由出也昔周之衰者有老聃莊周列禦冦之徒更為虛無淡泊之言而治其猖狂浮遊之説紛紜顚倒而卒歸於無有由其道者蕩然莫得其當是以忘乎富貴之樂而齊乎死生之分此不得志於天下高世逺舉之人所以放心而無憂雖非聖人之道而其用意固亦無惡於天下自聃之死百餘年有商鞅韓非著書言治天下無若刑名之賢及秦用之終於勝廣之亂教化不足而法有餘秦以不祀而天下被其毒後世之學者知申韓之罪而不知老聃莊周之使然何者仁義之道起於夫婦父子兄弟相愛之間而禮法刑政之原出於君臣上下相忌之際相愛則有所不忍相忌則有所不敢不敢與不忍之心合而後聖人之道得存乎其中今老聃莊周論君臣父子之間泛泛乎若萍遊於江湖而適相值也夫是以父不足愛而君不足忌不忌其君不愛其父則仁不足以懷義不足以勸禮樂不足以化此四者皆不足用而欲置天下於無有夫無有豈誠足以治天下哉商鞅韓非求為其説而不得得其所以輕天下齊萬物之術是以敢為殘忍而無疑今夫不忍殺人而不足以為仁而仁不足以治民則是殺人不足以為不仁而不仁亦不足以亂天下如此則舉天下惟君之所為刀鋸斧鉞何施而不可昔者夫子未嘗一日易其言雖天下之小物亦莫不有所畏今其視天下眇然若不足為者此其所以輕殺人歟太史遷曰申子卑卑施於名實韓子引繩墨切事情明是非其極慘核少恩皆原於道德之意嘗讀而思之事固有不相謀而相感者莊老之後其禍為申韓自三代之衰至於今凡所以亂聖人之道者其弊固已多矣而未知其所終奈何其不為之所也孫武論先説用智之難智一用則三患皆至惟出於三患之外方可用即聖人之事可見而或者之言不足信古之善言兵者無出於孫子矣利害之相權竒正之相生戰守攻圍之法蓋以百數雖欲加之而不知所以加之矣然其所短者智有餘而未知所以用智此豈非其所大闕歟夫兵無常形而逆為之形勝無常處而多為之地是以其説屢變而不同縱橫委曲期於避害而就利雜然舉之而聼用者之自擇也是故不難於用而難於擇擇之為難者何也鋭於西而忘於東見其利而不見其所窮得其一説而不知其又有一説也此豈非用智之難歟夫智本非所以教人以智教人者是君子之急於有功也變詐滑其外而無守於其中則是五尺童子皆欲為之使人勇而不自知貪而不顧以陷於難則有之矣深山大澤有天地之寶無意於寶者得之操舟於河舟之逆順與水之曲折忘於水者見之是故惟天下之至廉為能貪惟天下之至靜為能勇惟天下之至信為能詐何者不役於利也夫不役於利則其見之也明見之也明則其發之也果古之善用兵者見其害而後見其利見其敗而後見其成其心間而無事是以若此明也不然兵未交而先志於得則將臨事而惑雖有大利尚安得而見之若夫聖人則不然居天下於貪而自居於廉故天下之貪者皆可得而用居天下於勇而自居於靜故天下之勇者皆可得而役居天下於詐而自居於信故天下之詐者皆可得而使天下之人欲有功於此而即以此自居則功不可得而成是故君子居晦以御明則明者畢見居隂以御陽則陽者畢赴夫然後孫子之智可得而用也易曰介于石不終日貞吉君子方其未發也介然如石之堅若將終身焉者及其發也不終日而作故曰不役於利則其見之也明見之也明則其發之也果今夫世俗之論則不然曰兵者詭道也非貪無以取非勇無以得非詐無以成廉靜而信者無用於兵者也嗟夫世俗之説行則天下紛紛如鳥獸之相摶嬰兒之相擊強者傷弱者廢而天下之亂何從而已乎朝錯論此篇前靣引入事説景帝時雖名為治平有七國之變此篇體製好大槩作文淅淅引入來天下之患最不可為者名為治平無事而其實有不測之憂坐觀其變而不為之所則恐至於不可救起而強為之則天下狃於治平之安而不吾信惟仁人君子豪傑之士為能出身為天下犯大難以求成大功此固非勉強期月之間而苟以求名者之所能也天下治平無故而發大難之端吾發之吾能收之然後有以辭於天下事至而循循焉欲去之使他人任其責則天下之禍必集於我昔者朝錯盡忠為漢謀弱山東之諸侯諸侯並起以誅錯為名而天子不之察以錯為之説天下悲錯之以忠而受禍不知錯之有以取之也古之立大事者不惟有超世之才亦必有堅忍不拔之志昔禹之治水鑿龍門決大河而放之海方其功之未成也蓋亦有潰冒衝突可畏之患惟能前知其當然事至不懼而徐為之所是以得至於成功夫以七國之強而驟削之其為變豈足怪哉錯不於此時捐其身為天下當大難之衝而制吳楚之命乃為自全之計欲使天子自將而已居守且夫發七國之難者誰乎已欲求其名安所逃其患以自將之至危與居守之至安已為難首擇其至安而遺天子以其至危此忠臣義士所以憤惋而不平者也當此之時雖無袁盎錯亦未免於禍何者已欲居守而使人主自將以情而言天子固已難之矣而重違其議是以袁盎之説得行於其間使吳楚反錯以身任其危日夜淬礪東向而待之使不至於纍其君則天子將恃之以為無恐雖有百袁盎可得而間哉嗟夫世之君子欲求非常之功則無務為自全之計使錯自將而擊吳楚未必無功惟其欲自固其身而天子不悅姦臣得以乘其隙錯之所以自全者乃其所以自禍歟孔子墮三都此篇須看他使事相形魯定公十三年孔子言於公曰臣無藏甲大夫無百雉之城使仲由為季氏宰將墮三都於是叔孫氏先墮郈季氏將墮費公山不狃叔孫輒率費人襲公公與三子入于季氏之宫孔子命申句須樂頎下伐之費人北二子奔齊遂墮費將墮成公斂處父以成叛公圍成弗克或曰殆哉孔子之為政也亦危而難成矣孔融曰古者王畿千里寰內不以封建諸侯曹操疑其論建漸廣遂殺融融特言之耳安能為哉操以為天子有千里之畿將不利已故殺之不旋踵季氏親逐昭公公死于外從公者皆不可入雖子家羈亦亡季氏之忌克忮害如此雖地勢不及曹氏然君臣相猜蓋不減操也孔子安能以是時墮其名都而出其藏甲也哉考於春秋方是時三桓雖若不悅然莫能違孔子也以為孔子用事於魯得政與民而三桓畏之歟則季桓子之受女樂也孔子能却之矣彼婦之口可以出走是孔子畏季氏季氏不畏孔子也夫孔子盍姑修其政刑以俟三桓之隙也哉蘇子曰此孔子之所以聖也歟蓋田氏六卿不服則齊晉無不亡之道三桓不臣則魯無可治之理孔子之用於世其政無急於此者矣彼晏嬰者亦知之曰田氏之僣惟禮可以已之在禮家施不及國大夫不收公利齊景公曰善哉吾今而後知禮之可以為國也嬰能知之而莫能為之嬰非不賢也其浩然之氣以直養而無害塞乎天地之間者不及孔孟也孔子以羈旅之臣得政期月而能舉治世之禮以律亡國之臣墮名都出藏甲而三桓不疑其害已此必有不言而信不怒而威者矣夫孔子之聖見於行事至此為無疑也嬰之用於齊也久於孔子景公之信其臣也愈於定公而田氏之禍不少衰吾是以知孔子之難也孔子以哀公十六年卒十四年陳恆弒其君孔子沭浴而朝告於哀公請討之吾是以知孔子欲治列國之君臣使如春秋之法者至於老且死而不忘也或曰孔子知哀公與三子之必不從而以禮告也歟曰否孔子實欲伐齊孔子既告公公曰齊為魯弱久矣子之伐之將若之何對曰陳恆弒其君民之不與者半以魯之衆加齊之半可克也此豈禮告而已哉哀公患三桓之逼嘗欲以越伐魯而去之夫以蠻夷伐國民不與也皋如出公之事斷可見矣豈若從孔子而伐齊乎若從孔子而伐齊則几所以勝齊之道孔子任之有餘矣既克田氏則魯之公室自張三桓不治而自服矣此孔子之志也秦始皇扶蘇志林不特文勢雄健議論亦至當秦始皇帝時趙高有罪蒙毅按之當死始皇赦而用之長子扶蘇好直諫上怒使北監蒙恬兵於上郡始皇東遊會稽並海走琅琊少子胡亥李斯蒙毅趙高從道病使蒙毅還禱山川未及還上崩李斯趙高矯詔立胡亥殺扶蘇蒙恬蒙毅卒以亡秦蘇子曰始皇制天下輕重之勢使內外相形以禁姦備亂者可謂密矣蒙恬將三十萬人威震北方扶蘇監其軍而蒙毅侍帷幄為謀臣雖有大姦賊敢睥睨其間哉不幸道病禱祠山川尚有人也而遣蒙毅故高斯得成其謀始皇之遣毅見始皇病病太子未立而去左右皆不可以言智雖然天之亡人國其禍敗必出於智所不及聖人為天下不恃智以防亂恃吾無致亂之道耳始皇致亂之道在用趙高夫閹尹之禍如毒藥猛獸未有不裂肝碎首者也自書契以來惟東漢吕強後唐張承業二人號稱善良豈可望一二於千萬以取必亡之禍哉然世主皆甘心而不悔如漢桓靈唐肅代猶不足深怪始皇漢宣皆英主亦湛於趙高恭顯之禍彼自以為聰明人傑也奴僕薰腐之餘何能為及其亡國亂朝乃與庸主不異吾故表而出之以戒後世人主如始皇漢宣者或曰李斯佐始皇定天下不可謂不智扶蘇親始皇子秦人戴之久矣陳勝假其名猶足以亂天下而蒙恬持重兵在外使二人不即受誅而復請之則斯髙無遺類矣以斯之智而不慮此何哉蘇子曰嗚乎秦之失道有自來矣豈獨始皇之罪自商鞅變法以殊死為輕典以參夷為常法人臣狼顧脅息以得死為幸何暇復請方其法之行也求無不獲禁無不止鞅自以為軼堯舜而駕湯武矣及其出亡而無所舍然後知為法之弊夫豈獨鞅悔之秦亦悔之矣荊軻之變持兵者熟視始皇環柱而走莫之救者以秦法重故也李斯之立胡亥不復忌二人者知威令之素行而臣子不敢復請也二人之不敢復請亦知始皇之鷙悍而不可回也豈料其偽也哉周公曰平易近民民必歸之孔子曰有一言而終身行之其恕矣乎夫以忠恕為心而以平易為政則上易知而下易達雖有賣國之姦無所投其隙倉卒之變無自發焉然其令行禁止蓋有不及商鞅者矣而聖人終不以彼易此鞅立信於徙木立威於棄灰刑其親戚師傅積威信之極以及始皇秦人視其君如雷霆鬼神不可測也古者公族有罪三宥然後制刑今至使人矯殺其太子而不忌太子亦不敢請則威信之過也故夫以法毒天下者未有不反中其身及其子孫者也漢武始皇皆果於殺者也故其子如扶蘇之仁則寧死而不請如戾太子之悍則寧反而不訴知訴之必不察也戾太子豈欲反者哉計出於無聊也故為二君之子者有死與反而已李斯之智蓋足以知扶蘇之必不反也吾又表而出之以戒後世人主之果於殺者此篇頭使內外相形一句始皇本無此意作文之法要説他後面不是故先張大以虛作實也范增志林這一篇要看抑揚處吾嘗論一段前平平説來忽換起放開説見得語新意屬又見一伏一起處漸次引入難一段之曲折若無陳涉之得民便接羽殺卿子一段去則文字直了無曲折且義帝之立一段亦直了惟有此二段然後見曲折處漢用陳平計間疏楚君臣項羽疑范增與漢有私稍奪其權增大怒曰天下事大定矣君王自為之願賜骸骨歸卒伍歸未至彭城疽發背死蘇子曰增之去善矣不去羽必殺增獨恨其不蚤耳然則當以何事去增勸羽殺沛公羽不聼終以此失天下當於是去耶曰否增之欲殺沛公人臣之分也羽之不殺猶有君人之度也增曷為以此去哉易曰知幾其神乎詩曰相彼雨雪先集為霰增之去當於羽殺卿子冠軍時也陳涉之得民也以項燕扶蘇項氏之興也以立楚懷王孫心而諸侯叛之也以弒義帝且義帝之立增為謀主矣義帝之存亡豈獨為楚之盛衰亦增之所與同福禍也未有義帝亡而增獨能久存者也羽之殺卿子冠軍也是弒義帝之兆也其疑義帝則疑增之本也豈必待陳平哉物必先腐也而後蟲生之人必先疑也而後讒入之陳平雖智安能間無疑之主哉吾嘗論義帝天下之賢主也獨遣沛公入關而不遣項羽識卿子冠軍於稠人之中而擢以為上將不賢而能如是乎羽既矯殺卿子冠軍義帝必不能堪非羽弒帝則帝殺羽不待智者而後知也增始勸項梁立義帝諸侯以此服從中道而弒之非增之意也夫豈獨非其意將必力爭而不聼也不用其言而殺其所立羽之疑增必自此始矣方羽殺卿子冠軍增與羽比肩而事義帝君臣之分未定也為增計者力能誅羽則誅之不能則去之豈不毅然大丈夫也哉增年已七十合則留不合則去不以此時明去就之分而欲依羽以成功陋矣雖然增髙帝之所畏也增不去項羽不亡嗚呼增亦人傑也哉大凡作漢唐文字前面若説他好後靣須説他些子不好處此前説增不足道後却説他好乃是放他一線地厲法禁此篇段假警䇿昔者聖人制刑賞知天下之樂乎賞而畏乎刑也是故施其所樂者自下而上民有一介之善不終朝而賞隨之是以上之為善者足以知其無有不賞也施其所畏者自上而下公卿大臣有毫髮之罪不終朝而罰隨之是以下之為不善者亦足以知其無有不罰也詩曰剛亦不吐柔亦不茹夫天下之所謂權豪貴顯而難令者此乃聖人所借以徇天下也舜誅四凶而天下服何也此四族者天下之大族也夫惟聖人為能擊天下之大族以服小民之心故其刑罰至於措而不用周之衰也商鞅韓非峻刑酷法以督責天下然所以為得者用法始於貴戚大臣而後及於疏賤故能以其國霸由此觀之商鞅韓非之刑非舜之刑而所以用刑者舜之術也後之庸人不深原其本末而猥以舜之用刑之術與商鞅韓非同類而棄之法禁之不行姦宄之不止由此其故也今夫州縣之吏受賂而鬻獄其罪至於除名而其官不足以贖則至於嬰木索受笞箠此亦天下之至辱也而士大夫或冒行之何者其心有所不服也今夫大吏之為不善非特簿書米鹽出入之間也其位愈尊則所害愈大其權愈重則其下愈不敢言幸而有不畏強禦之士出力而排之又幸而有不為上下之所抑以遂成其罪則其官之所減者至於罰金蓋無幾矣夫過惡暴著於天下而罰不傷其毫毛鹵莾於公卿之間而纎悉於州縣之小吏用法如此宜其天下之不心服也用法之不服其心雖刀鋸斧鉞猶將有所不避而况木索笞箠哉方今法令至繁觀其所以防姦之具一舉足且入其中而大吏犯之不至於可畏其故何也天下之議者曰古者之制刑不上大夫大臣不可以法加也嗟夫刑不上大夫者豈曰大夫以上有罪而不刑歟古之人君責其公卿大夫至重而待其士庶人至輕也責之至重故其所以約束之者愈寬待之至輕故其所以隄防之者甚密夫所責乎大臣者惟其不待約束而後免於罪戾也是故約束愈寬而大臣益以畏法何者其心以為人君之不我疑而不忍欺也苟幸其不疑而輕犯法則固已不容於誅矣故夫大夫以上有罪不從訊鞠論報如士庶人之法斯以為刑不上大夫而已矣天下之吏自一命以上其涖官臨民苟有罪皆書於其所謂歷者而至於館閣之臣出為郡縣者則隨罷去此真聖人之意欲有以重責之也奈何其與士庶人較罪之輕重而又以其爵減耶夫律有罪而得以首免者所以開盜賊小人自新之塗而今之卿大夫有罪亦得以首免是以盜賊小人待之歟天下惟其無罪也是以罰不可得而加如知其有罪而特免其罰則何以令天下今夫大臣有不法或者既以舉之而詔曰勿推此何為者也聖人為天下豈容有此曖昧而不決故曰厲法禁自大臣始小臣不敢犯也倡勇敢戰以勇為主以氣為決天子無皆勇之將而將軍無皆勇之士是故致勇有術致勇莫先乎倡倡莫善乎私此二者兵之微權英雄豪傑之士所以隂用而不言於人而人亦莫之識也臣請得以備言之夫倡者何也氣之先也有人人之勇怯有三軍之勇怯人人而較之則勇怯之相去若挺與楹至於三軍之勇怯則一也出於反覆之間而差於毫釐之際故其權在將與君人固有暴猛獸而不操兵出入於白刃之中而色不變者有見虺蜴而却走聞鐘鼓之聲而戰栗者是勇怯之不齊至於如此然閭閻之小民爭鬭戲笑卒然之間而或至於殺人當其發也其心翻然其色勃然若不可以已者雖天下之勇夫無以過之及其退而思其身顧其妻子未始不惻然悔也此非必勇者也氣之所乘則奪其性而忘其故故古之善用兵者用其翻然勃然而未悔之間而其不善者沮其翻然勃然之心而開其自悔之意則是不戰而先自敗也故曰致勇有術致勇莫先乎倡均是人也皆食其食皆任其事天下有急而有一人焉奮而爭先而致其死則翻然者衆矣弓矢相及劒楯相摶勝負之勢未有所決而三軍之士屬目於一夫之先登則勃然者相繼矣天下之大可以名劫也三軍之衆可以氣使也諺曰一人善射百夫決拾苟有以發之及其翻然勃然之間而用其鋒是之謂倡倡莫善乎私天下之人怯者居其百勇者居其一是勇者難得也捐其妻子棄其身以蹈白刃是勇者難能也以難得之人行難能之事此必有難報之恩者矣天子必有所私之將將軍必有所私之士視其勇者而隂厚之人之有異材者雖未有功而其心莫不自異自異而上不異之則緩急不可以望其為倡故凡緩急而肯為倡者必其上之所異也昔漢武欲觀兵於四夷以逞其無厭之求不愛通侯之賞以招勇士風告天下以求奮擊之人然卒無有應者於是嚴刑峻法致之死亡而聼其以深入贖罪使勉強不得已之人馳驟於死亡之地是故其將降而兵破敗而天下幾至於不測何者先無所異之人而望其為倡不已難乎私者天下之所惡也然而為已而私之則私不可用為其賢於人而私之則非私無以濟蓋有無功而可賞有罪而可赦者凡所以愧其心而責其為倡也天下之禍莫大於上作而下不應上作而下不應則上亦將窮而自止方西戎之叛也天子非不欲赫然誅之而將帥之臣謹守封略收視內顧莫有一人先奮而致命而士亦循循焉莫肯盡力不得已而出爭先而歸故西戎得以肆其猖狂而吾無以應則其勢不得不重賂而求和其患起於天子無同憂患之臣而將軍無腹心之士西師之休十有餘年矣用法益密而進人益艱賢者不見異勇者不見私天下務為奉法循令要以如式而止臣不知其緩急將誰為之倡哉錢塘勤上人詩集序昔翟公罷廷尉賔客無一人至者其後復用賔客欲往翟公大書其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見世以為口實然余嘗薄其為人以為客則陋矣而公之所以待客者獨不為小哉故太子太師歐陽公好士為天下第一士有一言中於道不遠千里而求之甚於士之求公以故盡致天下豪俊自庸衆人以顯於世者固多矣然士之負公者亦時有之蓋嘗慨然太息以人之難知為好士者之戒意公之於士自是少倦而其退老於潁水之上豫往見之則猶論士之賢者惟恐其不聞於世也至於負者則曰是罪在我非其過翟公之客負公於死生貴賤之間而公之士叛公於瞬息俄頃之際翟公罪客而公罪已與士益厚賢於古人逺矣公不喜佛老其徒有治詩書學仁義之説者必引而進之佛者惠勤從公遊三十餘年公嘗稱之為聰明才智有學問者尤長於詩公薨於汝隂豫哭之於其室其後見之語及於公未嘗不涕泣也勤固無求於世而公又非有德於勤者其所以涕泣不忘豈為利也哉豫然後益知勤之賢使其得列於士大夫之間而從事於功名其不負公也審矣熙寧七年豫自錢塘將赴髙密勤出其詩若干篇求豫文以傳於世豫以為詩非待文而傳者也若其為人之大略則非斯文莫之傳也六一居士集敘此篇曲折最多破頭説大故下靣應亦言大今人文字上靣言大下面未必言大上靣言逺下靣未必言逺如以文章配天孔孟配禹果然大而非夸夫言有大而非夸達者信之衆人疑焉孔子曰天之將喪斯文也後死者不得與於斯文也孟子曰禹抑洪水孔子作春秋孟子距楊墨蓋以是配禹也文章之得喪何與於天而禹之功與天地並孔子孟子以空言配之不以夸乎自春秋作而亂臣賊子懼孟子之言行而楊墨之道廢天下以為是固然而不知其功孟子既沒有申商韓非之學違道而趨利殘民以厚主其説至陋也而士以是罔其上上之人僥幸一切之功靡然從之而世無大人先生如孔子孟子者推其本末權其禍福之輕重以救其惑故其學遂行秦以是喪天下陵夷至於勝廣劉項之禍死者十八九天下蕭然洪水之患蓋不至此也方秦之未得志也使復有一孟子則申韓為空言作於其心害於其事作於其事害於其政者必不至若是烈也使楊墨得志於天下其禍豈減於申韓哉由此言之雖以孟子配禹可也太史公曰蓋公言黃老賈誼朝錯明申韓錯不足道也而誼亦為之豫以是知邪説之移人雖豪傑之士有不免者况衆人乎自漢以來道術不出於孔氏而亂天下者多矣晉以老莊亡梁以佛亡莫或正之五百餘年而後得韓愈學者以愈配孟子蓋庶幾焉愈之後三百有餘年而後得歐陽子其學推韓愈孟子以達於孔氏著禮樂仁義之實以合於大道其言簡而明信而通引物連類折之於至理以服人心故天下翕然師尊之自歐陽子之存世之不説者譁而攻之能折用其身而不能屈其言士無賢不肖不謀而同曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景佑極矣而斯文終有愧於古士亦因陋守舊論卑而氣弱自歐陽子出天下爭自濯磨以通經學古為髙以救時行道為賢以犯顧納諫為忠長育成就至嘉祐末號稱多士歐陽子之功為多嗚呼此豈人力也哉非天其孰能使之歐陽子沒十有餘年士始為新學以佛老之似亂周孔之實識者憂之賴天子明聖詔修取士法風厲學者專治孔氏黜異端然後風俗一變考論師友淵源所自復知誦習歐陽子之書豫得其詩文七百六十六篇於其子棐乃次而論之曰歐陽子論大道似韓愈論事似陸贄記事似司馬遷詩賦似李白此非豫言也天下之言也歐陽子諱修字永叔既老自謂六一居士云潮州韓文公廟碑匹夫而為百世師一言而為天下法是皆有以參天地之化關盛衰之運其生也有自來其逝也有所為故申吕自嶽降傅説為列星古今所傳不可誣也孟子曰我善養吾浩然之氣是氣也寓於尋常之中而塞乎天地之間卒然遇之則玉公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辨是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神而明則復為人此理之常無足怪者自東漢以來道喪文弊異端並起歷唐貞觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸於正蓋三百年於此矣文起八代之衰道濟天下之溺忠犯人主之怒而勇奪三軍之帥此豈非參天地關盛衰浩然而獨存者乎蓋嘗論天人之辨以謂人無所不至惟天不容偽智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精神能開衡山之雲而不能回憲宗之惑能馴鰐魚之暴而不能弭皇父鏄李逄吉之謗能信於南海之民廟食百世而不能使其身一日安之於朝廷之上蓋公之所能者天也其所不能者人也始潮人未知學公命進士趙德為之師自是潮之士皆篤於文行延及齊民至於今號稱易治信乎孔子之言君子學道則愛人而小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉而廟在刺史公堂之後民以出入為艱前守欲請諸朝將新廟不果元祐五年朝散郎王君滌來守是邦凡所以養民治士者一以公為師民既悅服則出令曰願新公廟者聼民歡趨之卜地於州城之南七里期年而廟成或曰公去國萬里而謫於潮不能一嵗而歸沒而有知其不眷戀於潮也審矣軾曰不然公之神在天下者如水之在地中無所往而不在也而潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水專在是豈理也哉王仲儀真贊敘孟子曰所謂故國者非有喬木之謂也有世臣之謂也又曰為政不難不得罪於巨室巨室之所慕一國慕之一國之所慕天下慕之夫所謂世臣者豈特世祿之人而巨室者豈特侈富之家也哉蓋功烈已著於時德望已信於人譬之喬木封植愛養自拱把以至於合抱者非一日之故也平居無事商功利課殿最誠不如新進之士至於緩急之際決大䇿安大衆呼之則來揮之則散者惟世臣巨室為能豫嘉祐中始識懿敏王公於成都其後從事於岐而公自許州移鎮平涼方是時虜大舉犯邊轉運使攝帥事與副總管議不合軍無紀律邊人大恐聲搖三輔及聞公來吏士踴躍傳呼旗斾精明鼓角歡亮虜即日解去公至燕勞將佐而已豫然後知老臣宿將其功用蓋如此使新進之士當之雖有韓白之勇良平之竒豈能坐勝默成如此之捷哉潁濵文三國論此篇要看開闔抑揚法天下皆怯而獨勇則勇者勝皆暗而獨智則智者勝勇而遇勇則勇者不足恃也智而遇智則智者不足用也夫惟智勇之不足以定天下是以天下之難鋒起而難平蓋嘗聞之古者英雄之君其遇智勇也以不智不勇而後真智大勇乃可得而見也悲夫世之英雄其處於世亦有幸不幸耶漢髙祖唐太宗是以智勇獨過天下而得之者也曹公孫劉是以智勇相遇而失之者也以智攻智以勇擊勇此譬如兩虎相捽齒牙氣力無以相勝其勢足以相擾而不足以相斃當此之時惜乎無有以漢髙帝之事制之者也昔者項籍乘百戰百勝之威而執諸侯之柄咄嗟叱吒奮其暴怒西向以逆髙祖其勢飄忽震蕩如風雨之至天下之人以為遂無漢矣然髙帝以其不智不勇之身橫塞其衝徘徊而不進其頑鈍椎魯足以為笑於天下而卒能摧折項氏而待其死此其故何也夫人之勇力用而不已則必有所耗竭而其智慮久而無成則亦必有所倦怠而不舉彼欲用其所長以制我於一時而我閉門而拒之使之失其所求逡巡求去而不能去而項籍固已敗矣今夫曹公孫權劉備此三人者皆知以其才相取而未知以不才取人也世之言者曰孫不如曹而劉不如孫劉備惟智短而勇不足故有所不若於二人者而不知因其所不足以求勝則亦已惑矣蓋劉備之才近似髙祖而不知所以用之之術昔髙祖之所以自用其才者其道有三焉耳先據勢勝之地以示天下之形廣收信越出竒之將以自輔其所不逮有果鋭剛猛之氣而不用以深折項籍猖狂之勢此三事者三國之君其才皆無有能行之者獨有一劉備近之而未至其中猶有翹然自喜之心欲為椎魯而不能純欲為果鋭而不能達二者交戰於中而未有所定是故所為而不成所欲而不遂棄天下而入巴蜀則非地也用諸葛孔明治國之才而當紛紜征伐之衝則非將也不忍忿忿之心犯其所短而自將以攻人則是其氣不足尚也嗟夫方其奔走於二袁之間困於吕布而狼狽於荆州百敗而其志不折不可謂無髙祖之風矣而終不知所以自用之方夫古之英雄惟漢髙帝為不可及也夫前説不好後略取劉備右三國論最要看反覆抑揚開闔法君術將求御天下之術必先明於天下之情不先明於天下之情則與無術何異夫天下之術臣固已略言之矣而又將竊言其情今使天子皆得賢人而任之雖可以無憂乎其為姦然猶有情焉而不可以不知蓋臣聞之有好為名髙者臨財而推之以讓其親見位而去之以讓其下進而天子禮焉則以為歡進而不禮焉則雖富之而不食其祿力為廉恥之節以髙天下若是而天子不知焉而發之以厚利則其心赧然有所不平人有好為厚利者見祿而受之以優其身見利而取之以豐其家良田大屋惟其與之則可以致其才如是而天子不知焉而強之以名髙則其心缺然有所不悅於其中人惟無好自勝也好自勝而不少柔之則忿鬭而不和人惟無所相惡也有所相惡而不為少避之則事其私怒而不求成功素剛則無折之也素畏則無強之也強之則將不勝而折之則將不振也凡此數者皆所以求用其才而不傷其心也然猶非所以御天下之姦雄蓋臣聞之天下之姦雄其為心也甚深其為迹也甚微將營其東而形之於西將取其右而擊之於左古之人有欲得其君之權者不求知其君也優遊翺翔而聼其君之所欲為使之得其所欲而油然自放以釋天下之權天下之權既去其君而無所歸然後徐起而收之故能取其權而其君不之知古之人有為之者李林甫是也夫人既獲此權也則思專而有之專而有之則常恐天下之人從而傾之夫人惟能自固其身而後可以謀人自固之不暇而欲謀人也實難故古之權臣常合天下之爭天下且相與爭而不解則其勢無暇及我是故可以久居而不去古之人有為之者亦李林甫是也世之人君苟無好惡之心幸而有好善之心則天下之小人皆將賣之以為姦何者有好善之名而不察其為善之實天下之善固有可謂之惡而天下之惡固有可謂之善者彼知吾之欲為善也則或先之以善而終之以惡或有指天下之惡而飾之以善古之人有為之者石顯是也人之將欲為此釁也將欲建此事也必先得於其君欲成事而君有所不悅則事不可以成故古之姦雄劫之以其所必不能其所必不能者不可為也則將反而從吾之所欲為古之人有為之者驪姬之説獻公使之老而被禍是也此數者天下之至情故聖人見其初而求其終聞其聲而推其形蓋惟能察人於無故之中故天下莫能欺何者無故者必有其故也古之眀王在上天下之小人伏而不見夫小人者豈其能無意於天下也舉而見其情發而中其病是以愧耻退縮而不敢進臣欲天子明知君子之情以蓋當世之賢公名卿而深察小人之病以絶其自進之漸此亦天下之至明也南豐文唐論此篇大意專説太宗精神處成康沒而民生不見先王之治日入於亂以至於秦盡除前聖數千載之法天下既攻秦而亡之以歸於漢漢之為漢更二十四君東西再有天下垂四百年然大抵多用秦法其改更秦事亦多附已之意非放先王之法而有天下之志也有天下之志者文帝而已然而天下之材不足故仁聞雖美矣而當世之法度亦不能放於三代漢之亡而強者遂分天下之地晉與隋雖能合天下於一然而合之未久而已亡其為不足議也代隋者唐更十八君垂三百年而其治莫盛於太宗太宗之為君也詘已從諫仁心愛人可謂有天下之志以租庸任民以府衛任兵以職事任官以材能任職以興義任俗以尊本任衆賦役有定制兵農有定業官無虛名職無廢事人習於善行離於末作使之操於上者要而不煩取於下者寡而易供民有農之實而兵之備存兵有兵之名而農之利在事之分有歸而祿之出不浮材之品不遺而治之體相承其廉耻日以篤其田野日以闢以其法修則安且治廢則危且亂可謂有天下之材行之數歲粟米之賤斗至數錢居者有餘蓄行者有餘資人人自厚幾於刑措可謂有治天下之效夫有天下之志有天下之材又有治天下之效然而不得與先王並者法度之行擬之先王未備也禮樂之具田疇之制庠序之教擬之先王未備也躬親行陳之間戰必勝攻必克天下莫不以為武而非先王之所尚也四夷萬古所未及以政者莫不服從天下莫不以為盛而非先王之所務也太宗之為政於天下者得失如此由唐虞之治五百餘年而有湯之治由湯之治五百餘年而有文武之治由文武之治千有餘年而始有太宗之為君有天下之志有天下之材又有治天下之效然而又以其未備也不得與先王並而稱極治之時是則人生於文武之前者率五百餘年而一遇治世生於文武之後者千有餘年而未遇極治之時者也非獨民之生於是時者之不幸也士之生於文武之前者如舜禹之於唐八元八凱之於舜伊尹之於湯太公之於文武率五百餘年而一遇生於文武之後者千有餘年雖孔子之聖孟軻之賢而不遇雖太宗之為君而未可以必得志於其時也是亦士民之生於是時者之不幸也故述其是非得失之迹非獨為人君者可以考焉士之有志於道而欲仕於上者可以鑒矣救災議此一篇後靣應得好説利害體河北地震水災隳城郭壞廬舍百姓暴露乏食主上憂憫下緩刑之令遣拊循之使恩甚厚也然百姓患於暴露非錢不可以立屋廬患於乏食非粟不可以飽二者不易之理也非得此二者雖主上憂勞於上使者旁午於下無以救其患塞其求也有司建言請發倉廩與之粟壯者人日二升幼者人日一升主上不旋日而許之賜之可謂大矣然有司之所言特常行之法非審計終始見於衆人之所未見也今河北地震水災所毁敗者甚衆可謂非常之變也遭非常之變者亦必有非常之恩然後可以振之今百姓暴露乏食已廢其業矣使之相率日待二升之廩於上則其勢必不暇乎他為是農不復得修其畎畝商不復得治其貨賄工不復得利其器用間民不復得轉移執事一切棄百事而專意於待升合之食以偷為性命之計是直以餓殍之徒養之而已非深思逺慮為百姓長計也以中户計之户為十人壯者六人月當受粟三石六斗幼者四人月當受粟一石二斗率一户月當受粟五石難可以久行也則百姓何以贍其後久行之則被水之地既無秋成之望非至來嵗麥熟賑之未可以罷自今至於來嵗麥熟凡十月一户當受粟五十石今被災者十餘州州以二萬户計之中户以上及非災害所被不仰食縣官者去其半則仰食縣官者為十萬户食之不遍則為施不均而民猶有無告者也食之遍則當用粟五百萬石而足何以辦此又非深思逺慮公家長計也至於給授之際有淹速有均否有真偽有會集之擾有辨察之煩厝置一差皆足致弊又羣而處之氣久蒸薄必生疾癘此皆必至之害也且此不過能使之得旦暮之食耳其於屋廬構築之費將安取哉屋廬構築之費既無所取而就食於州縣必相率而去其故居雖有頽墻壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者必棄之而不暇顧甚則殺牛馬而去者有之伐桑棗而去者有之其害又可謂甚也今秋氣已半霜露方始而民露處不知所蔽蓋流亡者亦已衆矣如是不可止則將空近塞之地空近塞之地失戰鬭之民此衆士大夫之所慮而不可謂無患者也空近塞之地失耕桑之民此衆士大夫所未慮而患之尤甚者也何則失戰鬬之民異時有警邊戍不可以不增爾失耕桑之民異時無事邊糴不可以不貴矣二者皆可不深念歟萬一或出於無聊之計有窺倉庫盜一囊之粟一束之帛者彼知已負有司之禁則必鳥駭鼠竄竊㺯鋤梃於草茅之中以捍遊徼之吏強者既囂而動則弱者必隨而聚矣不幸或連一二城之地有枹鼓之警國家胡能晏然而已乎况夫外有夷狄之可慮內有郊祀之將行安得不防之於未然銷之於未萌也然則為今之䇿下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則今被災之州為十萬户如一户得粟十石得錢五千下户常産之資平日未有及此者也彼得錢以完其居得粟以給其食則農得修其畎畝商得治其貨賄工得利其器用間民得轉移執事一切得復其業而不失其常生之計與專意以待二升之廩於上而勢不暇乎他為豈不逺哉此可謂深思逺慮為百姓長計者也由有司之説則用十月之費為粟五百萬石由今之説則用兩月之費為粟一百萬石况貸之於今而收之於後足以振其艱乏而終無損於儲峙之實所實費者錢五巨萬貫而已此可謂深思逺慮為公家長計者也又無給授之弊疾癘之憂民不必去其故居苟有頽墻壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者皆得而不失况於全牛馬保桑棗其利又可謂甚也雖寒氣方始而無暴露之患民安食足則有樂生自重之心各復其業則勢不暇乎他為雖驅之不去誘之不為盜矣夫飢嵗聚餓殍之民而與之升合之食無益於救災補敗之數此常行之弊法也今破去常行之弊法以錢與粟一舉而賑之足以救其患復其業河北之民聞詔令之出必皆喜上之足賴而自安於畎畝之中負錢與粟而歸與其父母妻子脫於流離轉死之禍則戴上之施而懷欲報之心豈有已哉天下之民聞國家措置如此恩澤之厚其孰不震動感激悅主上之義於無窮乎如是而人和不可致天意不可悅者未之有也人和洽於下天意悅於上然後玉路徐動就陽而郊荒夷殊陬奉幣來享疆內安輯里無囂聲豈不適變於可為之時消患於無形之內乎此所謂審計終始見於衆人之所未見也不早出此或至於一有枹鼓之警則雖欲為之將不及矣或謂方今錢粟恐不足以辦此夫王者之富藏之於民有餘則取不足則與此理之不易者也故曰百姓足君孰與不足百姓不足君孰與足蓋百姓富實而國獨貧與百姓餓殍而上獨能保其富者自古及今未之有也故又曰不患貧而患不安此古今之至戒也是故古者二十七年耕有九年之蓄足以備水旱之災然後謂之王政之成唐水湯旱而民無捐瘠者以是故也今國家倉庫之積固不獨為公家之費而已凡以為民也雖倉無餘粟庫無餘財至於救災補敗尚不可以已况今倉庫之積尚可以用獨安可以過憂將來之不足而立視夫民之死乎古人有言曰剪爪宜及膚割髮宜及體先王之於救災髮膚尚無足愛况外物乎且今河北州軍凡三十七災害所被十餘州軍而已他州之田秋稼足望令有司於糴粟常價斗增一二十錢非獨足以利農其於增糴一百萬石易矣斗增一二十錢吾權一時之事有以為之耳以實錢給其常價以茶荈香藥之類佐其虛估不過損茶荈香藥之類為錢數巨萬貫而其費已足茶荈香藥之類與百姓之命孰為可惜不待議而可知者也夫費錢五巨萬貫又捐茶荈香藥之類為錢數巨萬貫而足以救一時之患為天下之計利害輕重又非難明者也顧吾之有司能越拘攣之見破常行之法與否而已此時事之急也故述斯議焉戰國䇿目録序此篇節奏從容和緩且有條理又藏鋒不露初讀若大羮玄酒須當子細味之若他練字好過換處不覺其間又有深意存劉向所定戰國䇿三十三篇崇文總目稱十一篇者闕臣訪之士大夫家始盡得其書正其誤謬而疑其不可考者然後戰國䇿三十三篇復完敘曰向敘此書言周之先明教化修法度所以大治及其後謀詐用而仁義之路塞所以大亂其説既美矣卒以謂此書戰國之謀士度時君之所能行不得不然則可謂惑於流俗而不篤於自信者也夫孔孟之時去周之初已數百嵗其舊法已亡舊俗已熄久矣二子乃獨明先王之道以謂不可改者豈將強天下之主以後世之所不可為哉亦將因其所遇之時所遭之變而為當時之法使不失乎先王之意而已二帝三王之治其變固殊其法固異而其為國家天下之意本末先後未嘗不同也二子之道如是而已蓋法者所以適變也不必盡同道者所以立本也不可不一此理之不易者也故二子者守此豈好為異論哉能勿苟而已矣可謂不惑乎流俗而篤於自信者也戰國之遊士則不然不知道之可信而樂於説之易合其設心注意偷為一切之計而已故論詐之便而諱其敗言戰之善而蔽其患其相率而為之者莫不有利焉而不勝其害也有得焉而不勝其失也卒至蘇秦商鞅孫臏吳起李斯之徒以亡其身而諸侯及秦用之者亦滅其國其為世之大禍明矣而俗猶莫之寤也惟先王之道因時適變為法不同而考之無疵用之無敝故古之聖賢未有以此而易彼也或曰邪説之害正也宜放而絶之則此書之不泯其可乎對曰君子之禁邪説也固當明其説於天下使當世之人皆知其説之不可從然後以禁則齊使後世之人皆知其説之不可為然後以戒則明豈必滅其籍哉放而絶之莫善於是是以孟子之書有為神農之言者有為墨子之言者皆著而非之至於此書之作則上繼春秋下至楚漢之起二百四五十年之間載其行事固不得而廢也此書有髙誘注者二十一篇或曰三十二篇崇文總目存者八篇今存者十篇云送趙宏序句雖少意極多文勢曲折極有味峻潔有力荊民與蠻合為冦潭旁數州被其害天子宰相以潭重鎮守臣不勝任為改用人又不勝復改之守至上書乞益兵詔與撫兵三百殿直天水趙君希道實護以往希道雅與豫接間過豫道潭之事豫曰潭山川甲兵如何食幾何賊衆寡強弱如何豫不能知能知書耳書之載若潭事多矣或合數道之兵以數萬絶山谷而進其勢非不衆且健也然而卒殱焉者多矣或單車獨行然而以克者相踵焉顧其義信如何耳致吾義信雖單車獨行冦可以為無事龔遂張綱祝良之類是也義信不足以致之雖合數道之兵以數萬卒殱焉適重冦耳况致平耶楊旻裴行立之類是也則兵不能致平致平者在太守身也明矣前之守者果能此天子宰相烏用改之必改之為前之守者不能此也今往者復曰乞益兵何其與書之云者異耶豫憂潭民之重困也冦之益張也往時潭吏與旁近郡靳力勝賊者暴骸者戮降者有之今之往者將特不為是而已耶抑猶不免乎為是也天子宰相任之之意其然耶潭守近侍臣使撫覘潭者郎吏御史博士相望為我諗其賢者曰今之言古書往往曰迂然書之事乃已試者也師巳試而施諸治與時人之自用孰為得失耶愚言儻可以平潭之患今雖細然大中咸通之間南方之憂常劇矣夫豈階於大哉為近臣郎吏御史博士者獨得而不思也希道固喜事者因其行遂次第其語以送之宛丘文景帝論景帝稱竇嬰沾沾自喜多易不足以任宰相持重乃相衛綰夫自喜多易不足以持重是也而求持重者必如綰則已甚矣古之知人者不觀其形而察其情得其妙而遺其似夫天下之善惡其似者固未必是而其真者或不可以形求也綰車戲之賤士也其椎魯庸鈍偶似夫敦厚長者之形耳夫敦厚之士其用之也必有蒙其利者矣豈謂其無是非可否如偶人者哉苟以是為長者而用之則世之可以持重者多矣夫惡馬之奔踶也求其無奔踶可也得偶馬而愛之可乎景帝之相綰也是愛偶馬之類也帝之惡周亞夫也曰此鞅鞅者非少主臣也卒殺之夫天下之情其未見於利害之際者舉不可知而要之易劫以勢者易動以利不輕許人之私者不輕行其私亞夫之不納文帝於細栁與夫不肯侯王信可謂不易以勢劫而無私意矣仗節死義與夫見利而心不動非輕勢而滅私者莫能可以相少主而共危難者意非亞夫不可而帝乃反之是徒以其剛徑不苟其形若難制而嫚上者故殺之而不疑嗚呼景帝者求之於形似而失之者也蓋昔者髙祖求傳如意者而不可得得一周昌能強項面折而髙祖遂以趙委之夫昌之不能脫如意於死其勢蓋有所迫而所以任昌者固相危弱之道也嗟夫周昌以此見取而亞夫乃用是不免則景帝之與髙祖其觀人也亦異矣用大論能用大而後能治天下則用大為最難夫惟有所不治而後能用大矣何則治大者莫若立法有所不治而後法立矣屨人之為屨也非量國人之足而為之度其中而為之夫一國之足雖不能盡合乎吾屨而中者居多故雖不知國人之足而不失鬻屨之利夫必將人人而較之則吾之為工不亦甚勞而長短小大之差殊要以不可盡得嗚呼使吾之為屨足以中國人之足矣雖有所遺而亦何害吾之大利哉通此説者其知用大乎夫立法以治天下者吾之法果足以盡天下之理包羅籠絡使天下之巧智不足以用其姦乎吾知其不能也夏后氏之為忠也使禹不知後世之將野則禹為不智也知而為之是禹亦無如之何也商之質周之文亦猶是也夫以聖人之智猶有所屈於事物之變則立法以求盡天下之理吾知聖人有所不能故立法乎此足以通天下之情至於聰明之所不及思慮之所難測出於人情之外者吾有所不治也而吾之法立矣且吾法果何為而起歟無乃出於天下之大情萬物之常理耶嗜膾炙者百人而惡之者一人膾炙之美未害也使吾之法足以當國人之十九則吾之利多矣其所不及焉吾可以無恤矣非不欲恤也勢不可也嗚呼自堯舜三代以來更數聖人其講天下之法亦詳矣然後世可考者如井田封建車徒之制亦不過設為大法而已世之惑者徒見其為法之略以謂不可以施於事而不知聖人示之大法不以臆度之區區以預盡天下之委曲苟有不合亦付之而已一絲之不齊無害其為裘一粒之不精無害其為食故曰有所不治而後法立矣傳曰小有所治者大有所失近有所遺者逺有所包此達於治體之論也或曰量國人之足以為屨不畏勞者能之盡天下之本以立法不厭詳者能之應之曰非勞與詳之避也國人之足可以盡量天下之情可以盡得雖費終身之力而為之何憚焉吾知決不可為也吾不若從其逸而不失為利者為之也嗚呼何至屑屑然語治天下之勞哉知所以立法而後知用大知用大而後能不出户而天下無遺慮矣古文關鍵卷下
